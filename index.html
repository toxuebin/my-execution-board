                     if (fCode.startsWith('us')) fCode = 'us' + fCode.slice(2).toUpperCase();

                             let prevClose = parseFloat(data[4]);
                             let change = parseFloat(data[31]);
                             let changePct = parseFloat(data[32]);

                                 if (!isNaN(currentPrice) && !isNaN(prevClose) && prevClose !== 0) {
                                     change = currentPrice - prevClose;
                                     changePct = (change / prevClose) * 100;
                                 } else {
                                     change = 0;
                                     changePct = 0;
                                 }
                             }

                                 name: name, 
                                 price: currentPrice || 0, 
                                 change: change.toFixed(3), 
                                 changePct: changePct.toFixed(2),
                                 isUS: originalCode.toLowerCase().startsWith('us')
                             });
                         }
                     }

                 setStockData(newStockData);

                 // 2. 针对美股，异步调用 Finnhub 覆盖盘前/盘后实时价格
                 const usCodes = baseCodes.filter(c => c.toLowerCase().startsWith('us'));
                 if (usCodes.length > 0) {
                     const finnhubOverrides = [];
                     
                     for (let i = 0; i < usCodes.length; i++) {
                         const originalCode = usCodes[i];
                         const symbol = originalCode.slice(2).toUpperCase(); // e.g., usSOXL -> SOXL
                         
                         try {
                             const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_API_KEY}`);
                             if (response.ok) {
                                 const data = await response.json();
                                 if (data && typeof data.c === 'number' && data.c > 0) {
                                     finnhubOverrides.push({
                                         code: originalCode,
                                         price: data.c,
                                         change: data.d ? data.d.toFixed(3) : "0.000",
                                         changePct: data.dp ? data.dp.toFixed(2) : "0.00"
                                     });
                                 }
                             }
                         } catch (err) {
                             console.warn(`Finnhub Failed for ${symbol}`, err);
                         }
                         
                         if (i < usCodes.length - 1) {
                             await new Promise(r => setTimeout(r, 200)); // 防超限
                         }

                    </div>

                    {/* 新增：阿里通义千问 API Key 配置区 */}
                    <div className="mt-4 pt-4 border-t border-gray-200 dark:border-[#213743]">
                        <label className={`block text-xs font-bold mb-2 flex items-center gap-1 ${theme.textSub}`}><Sparkles className="w-3.5 h-3.5 text-purple-500"/> 阿里通义千问 API Key (已内置)</label>
                        <input 
                            type="password"
                            value={aiApiKeyInput} 
                            onChange={e => setAiApiKeyInput(e.target.value)}
                            className={`w-full p-3 rounded-xl border outline-none text-sm ${theme.inputBg} ${theme.textMain}`}
                        />
                    </div>
                </div>

                <div className="mt-6 pt-4 border-t border-gray-200 dark:border-[#213743] flex gap-3">
                   <button onClick={handleSaveConfig} className="flex-[2] py-3 bg-blue-600 text-white font-bold rounded-xl shadow-md">更新自定义修改 (非必要)</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const HabitGrid = ({ label, target, list, onToggle, theme, color, icon }) => {
      const slots = Array.from({ length: target === 8 ? 8 : 31 }, (_, i) => i + 1);
      const current = list ? list.filter(Boolean).length : 0;
      return (
        <div className={`p-4 rounded-[1.5rem] ${theme.isDark ? 'bg-black/10' : 'bg-slate-50/50'}`}>
          <div className="flex justify-between items-center mb-2"><span className={`text-xs font-black flex items-center gap-1.5 ${theme.textSub}`}>{icon} {label}</span><span className={`text-sm font-bold ${theme.textMain}`}>{current}/{target}</span></div>
          <div className={`grid ${target === 8 ? 'grid-cols-4' : 'grid-cols-7'} gap-1.5`}>
            {slots.map(num => {
              const isSel = list ? list[num-1] : false;
              return (
                <div key={num} onClick={() => onToggle(num - 1)} className={`h-8 rounded-xl flex items-center justify-center text-[10px] font-black cursor-pointer transition-all ${isSel ? 'scale-105 shadow-md' : theme.habitBox}`} style={{ backgroundColor: isSel ? color : '', color: isSel ? 'white' : theme.calendarNum }}>{isSel ? '✓' : num}</div>
              );
            })}
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
