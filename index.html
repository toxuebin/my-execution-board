<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的执行看板 Pro</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
  <script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?bundle&external=react"
      }
    }
  </script>
  
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { display: none; }
    .glass-panel { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    
    .ticker-scroll::-webkit-scrollbar { display: none; }
    .ticker-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes scrollY { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
    .news-ticker { animation: scrollY 40s linear infinite; }
    .news-ticker:hover { animation-play-state: paused; }
    
    .mask-image-linear-y { -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent); }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from 'firebase/auth';
    import { getFirestore, doc, setDoc, onSnapshot } from 'firebase/firestore';
    import * as LucideIcons from 'lucide-react';
    
    const {
      CheckCircle2, Circle, Heart, Mic, Video, UserPlus, Calculator, X, ChevronDown, ChevronLeft, ChevronRight, Target,
      Zap, RefreshCw, Flame, Sun, Moon, Sparkles, Book, FileSearch, Trophy, Coffee, Gift,
      CloudRain, Wind, Droplets, ThermometerSun, Palmtree, Snowflake, Leaf, Flower2,
      Lock, Unlock, Plus, Minus, History, ArrowLeft, Phone, Calendar, Trash2, Edit2, AlertCircle, Star, BellRing, DownloadCloud, Cake,
      Wallet, Receipt, TrendingUp, TrendingDown, Share, Settings, Wand2, Film, PlayCircle,
      Activity, Globe, ExternalLink, List, UserPlus2, PieChart, Eye, EyeOff
    } = LucideIcons;

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    let firebaseApp, auth, db, appId;
    if (Object.keys(firebaseConfig).length > 0 && firebaseConfig.apiKey) {
      try { firebaseApp = initializeApp(firebaseConfig); auth = getAuth(firebaseApp); db = getFirestore(firebaseApp); appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id'; } 
      catch (e) { console.warn("Firebase Init Failed", e); }
    }

    const INITIAL_ANNUAL_TARGET = 123; 
    
    const FAMILY_BIRTHDAYS = [
      { name: "母亲", month: 5, day: 16, type: 'birthday' }, { name: "父亲", month: 6, day: 14, type: 'birthday' },
      { name: "老婆", month: 8, day: 31, type: 'birthday' }, { name: "儿子", month: 9, day: 3, type: 'birthday' },
      { name: "女儿", month: 4, day: 23, type: 'birthday' }, { name: "我自己", month: 11, day: 16, type: 'birthday' }
    ];

    const HOLIDAYS = [
      { name: "元旦", month: 1, day: 1, type: 'holiday' }, { name: "春节", month: 2, day: 17, type: 'holiday' }, 
      { name: "妇女节", month: 3, day: 8, type: 'holiday' }, { name: "劳动节", month: 5, day: 1, type: 'holiday' },
      { name: "国庆节", month: 10, day: 1, type: 'holiday' }, { name: "除夕", month: 2, day: 16, type: 'holiday' }
    ];

    const MOTTO_LIST = [
      "结果不会说谎，数据是唯一的解药。", "每一步都算数，今天的汗水是明天的复利。",
      "即便世界再嘈杂，也要守住你内心的执行节奏。", "爱自己最好的方式，是让自己变得优秀且富有。",
      "所有的伟大，都源于死磕的坚持。"
    ];

    const MONTH_LOGOS = {
      3: { icon: Leaf, color: "text-emerald-500", bg: "bg-emerald-500/10", title: "春生", main: "3月 · 蛰伏与破局", sub: "万物复苏，正是拔节生长时间" },
      4: { icon: CloudRain, color: "text-blue-400", bg: "bg-blue-400/10", title: "润物", main: "4月 · 扎根与向日", sub: "向下扎根，向上野蛮生长" },
      5: { icon: Flower2, color: "text-pink-500", bg: "bg-pink-500/10", title: "繁花", main: "5月 · 繁花与盛放", sub: "热烈且自由，做自己的光" },
      6: { icon: Sun, color: "text-orange-500", bg: "bg-orange-500/10", title: "骄阳", main: "6月 · 烈日与淬炼", sub: "百炼成钢，不负炽热野心" },
      7: { icon: ThermometerSun, color: "text-red-500", bg: "bg-red-500/10", title: "盛夏", main: "7月 · 极热与坚守", sub: "耐得住酷暑，方能等来清凉" },
      8: { icon: Palmtree, color: "text-teal-500", bg: "bg-teal-500/10", title: "葱茏", main: "8月 · 狂热与沉淀", sub: "越是喧嚣，越要内求平静" },
      9: { icon: Wind, color: "text-amber-500", bg: "bg-amber-500/10", title: "秋风", main: "9月 · 乘风与破浪", sub: "长风破浪会有时，直挂云帆" },
      10: { icon: Moon, color: "text-indigo-400", bg: "bg-indigo-400/10", title: "明月", main: "10月 · 澄明与收获", sub: "行至水穷处，坐看云起时" },
      11: { icon: Snowflake, color: "text-sky-300", bg: "bg-sky-300/10", title: "初雪", main: "11月 · 凝霜与蓄锐", sub: "沉下心来，厚积才能薄发" },
      12: { icon: Gift, color: "text-rose-500", bg: "bg-rose-500/10", title: "岁盈", main: "12月 · 圆满与感恩", sub: "岁末将至，敬颂冬绥" }
    };

    const FIXED_WEEKLY_TASKS = [
      { text: "周一写清本周3个关键目标", category: "work", critical: true }, { text: "完成2-3个高价值动作", category: "work", critical: true },
      { text: "周五做一次周复盘", category: "work" }, { text: "运动2次 (每次30-45分钟)", category: "life" },
      { text: "安排1次高质量家庭时间", category: "life", critical: true }, { text: "阅读1-2次 (累计≥60分钟)", category: "learning" },
      { text: "投资学习1次 (30-60分钟)", category: "learning" }, { text: "检查仓位是否偏离计划", category: "investment" }
    ];

    const FULL_YEAR_PLAN = {
      3: { keyword: "定盘 + 建系统 + 稳节奏", weeks: [
        { title: "第1周：定盘与建系统", tasks: [{text:"写下年度目标100万", cat:"work", crit:true},{text:"建立月周日模板", cat:"work", crit:true},{text:"梳理客户ABC级", cat:"work"},{text:"建立年度书单", cat:"learning", crit:true}] },
        { title: "第2周：拉稳节奏", tasks: [{text:"明确本月高价值动作", cat:"work", crit:true},{text:"跟进A类客户", cat:"work"},{text:"联系第1位高手交流", cat:"learning"}] },
        { title: "第3周：开始产出", tasks: [{text:"推进项目进入下阶段", cat:"work", crit:true},{text:"完成第1位高手交流", cat:"learning", crit:true}] },
        { title: "第4周：收口复盘", tasks: [{text:"全月大复盘", cat:"work", crit:true},{text:"定稿亲子游方案", cat:"life"}] }
      ]},
      ...Array.from({length: 9}, (_, i) => i + 4).reduce((acc, m) => ({...acc, [m]: { keyword: "年度持续执行", weeks: Array(4).fill({ title: `计划执行周`, tasks: [] }) }}), {})
    };

    const App = () => {
      const [isDarkMode, setIsDarkMode] = useState(() => new Date().getHours() >= 19 || new Date().getHours() < 7);
      const [currentTime, setCurrentTime] = useState(new Date());
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(false);
      const [currentMotto, setCurrentMotto] = useState("");

      const systemMonth = currentTime.getMonth() + 1;
      const systemYear = currentTime.getFullYear();
      const [viewMonth, setViewMonth] = useState(systemMonth);
      const [activeWeek, setActiveWeek] = useState(0);

      const [usdToCnyRate, setUsdToCnyRate] = useState(7.20);

      // 核心数据状态
      const [allMonthData, setAllMonthData] = useState({});
      const [tasksCompleted, setTasksCompleted] = useState({});
      const [clients, setClients] = useState([]);
      const [investments, setInvestments] = useState({ A: { initialCapital: 1000000, records: {} }, US: { initialCapital: 100000, records: {} } });
      const [expenses, setExpenses] = useState({}); 
      const [portfolio, setPortfolio] = useState([]); 
      const [showPortfolioDetails, setShowPortfolioDetails] = useState(false); // 控制持仓显示
      
      const [editAuthTime, setEditAuthTime] = useState(0);
      const [showDataAuthModal, setShowDataAuthModal] = useState(false);
      const [dataAuthPwd, setDataAuthPwd] = useState('');
      const [pendingAction, setPendingAction] = useState(null);
      const [authErrorShake, setAuthErrorShake] = useState(false);

      const getTodayDateString = () => {
        const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      const [showClientModal, setShowClientModal] = useState(false);
      const [crmTab, setCrmTab] = useState('list'); 
      const [showCalc, setShowCalc] = useState(false);
      const [calcInput, setCalcInput] = useState('0');
      
      const [stockData, setStockData] = useState([]);
      const [stockError, setStockError] = useState(false);
      const [showPortfolioModal, setShowPortfolioModal] = useState(false);
      const [newPosition, setNewPosition] = useState({ code: '', quantity: '', costPrice: '' });
      const [newsList, setNewsList] = useState([]);

      const [showExpenseModal, setShowExpenseModal] = useState(false);
      const [expenseType, setExpenseType] = useState('out');
      const [newExpenseText, setNewExpenseText] = useState('');
      const [manualExpense, setManualExpense] = useState({ amount: '', desc: '' });
      const [investMode, setInvestMode] = useState('amount'); 
      const [investTab, setInvestTab] = useState('daily'); 
      const [investMarket, setInvestMarket] = useState('A');
      const [stageDates, setStageDates] = useState({ start: getTodayDateString(), end: getTodayDateString() });
      const [investModal, setInvestModal] = useState({ show: false, date: '', val: '' });
      const [capitalModal, setCapitalModal] = useState({ show: false, val: '' });

      const [isClientAuth, setIsClientAuth] = useState(false);
      const [clientPwdInput, setClientPwdInput] = useState('');
      const [newClient, setNewClient] = useState({ date: getTodayDateString(), name: '', phone: '', level: 'B', remindDays: '0' });
      const [phoneError, setPhoneError] = useState('');
      const [phoneLocation, setPhoneLocation] = useState('');
      const [isLocating, setIsLocating] = useState(false); 
      const [clientFormError, setClientFormError] = useState('');
      const [pwdErrorShake, setPwdErrorShake] = useState(false);
      const [activeClientForFollowUp, setActiveClientForFollowUp] = useState(null);
      const [newFollowUp, setNewFollowUp] = useState('');
      const [newFollowUpRemind, setNewFollowUpRemind] = useState('0');
      const [editingFollowUpId, setEditingFollowUpId] = useState(null);
      const [editingFollowUpText, setEditingFollowUpText] = useState('');
      const queryTimeoutRef = useRef(null);

      // 计算器功能
      const handleCalcBtn = (val) => {
         if(val === 'C') { setCalcInput('0'); }
         else if(val === 'DEL') { setCalcInput(prev => prev.length > 1 ? prev.slice(0, -1) : '0'); }
         else if(val === '=') { try { setCalcInput(eval(calcInput.replace('×','*').replace('÷','/')).toString()); } catch(e) { setCalcInput('Error'); setTimeout(()=>setCalcInput('0'), 1000); } } 
         else { setCalcInput(prev => (prev === '0' || prev === 'Error') ? val : prev + val); }
      };

      useEffect(() => {
        fetch('https://api.exchangerate-api.com/v4/latest/USD').then(res => res.json())
          .then(data => { if(data && data.rates && data.rates.CNY) setUsdToCnyRate(data.rates.CNY); })
          .catch(() => console.log('使用默认汇率 7.2'));
      }, []);

      // 腾讯财经股票接口
      useEffect(() => {
         const fetchStocks = () => {
             const activeCodes = [...new Set([...portfolio.map(p => p.code), 'sh000001', 'usDJI'])];
             const script = document.createElement('script');
             script.src = `https://qt.gtimg.cn/q=${activeCodes.join(',')}&_t=${Date.now()}`;
             script.onload = () => {
                 const res = [];
                 activeCodes.forEach(code => {
                     const varName = `v_${code}`;
                     if(window[varName]) {
                         const data = window[varName].split('~');
                         if(data.length > 30) {
                             res.push({ code, name: data[1], price: data[3], change: data[31], changePct: data[32] });
                         }
                     }
                 });
                 if (res.length > 0) { setStockData(res); setStockError(false); }
                 if (document.head.contains(script)) document.head.removeChild(script);
             };
             script.onerror = () => {
                 setStockError(true);
                 if (document.head.contains(script)) document.head.removeChild(script);
             };
             document.head.appendChild(script);
         };
         fetchStocks();
         const interval = setInterval(fetchStocks, 6000); 
         return () => clearInterval(interval);
      }, [portfolio]);

      // 财经新闻
      useEffect(() => {
         const fetchNews = () => {
             const cbName = 'sinaNewsCb_' + Date.now();
             window[cbName] = (data) => {
                 if(data && data.result && data.result.data) {
                     setNewsList(data.result.data.slice(0, 6)); 
                 }
                 delete window[cbName];
             };
             const script = document.createElement('script');
             script.src = `https://feed.mix.sina.com.cn/api/roll/get?pageid=153&lid=2509&k=&num=10&page=1&callback=${cbName}&_t=${Date.now()}`;
             document.body.appendChild(script);
             setTimeout(() => { if(document.body.contains(script)) document.body.removeChild(script); }, 3000);
         };
         fetchNews();
         const interval = setInterval(fetchNews, 60000);
         return () => clearInterval(interval);
      }, []);

      const upcomingEvents = useMemo(() => {
        const today = currentTime;
        const allEvents = [...FAMILY_BIRTHDAYS, ...HOLIDAYS];
        const withDays = allEvents.map(e => {
            let eventDate = new Date(today.getFullYear(), e.month - 1, e.day);
            if (eventDate < new Date(today.getFullYear(), today.getMonth(), today.getDate())) { eventDate = new Date(today.getFullYear() + 1, e.month - 1, e.day); }
            const daysAway = Math.ceil((eventDate - today) / (1000 * 60 * 60 * 24));
            return { ...e, daysAway };
        }).sort((a,b) => a.daysAway - b.daysAway);
        return withDays.slice(0, 3); 
      }, [currentTime.getDate()]);

      const [activeEventIdx, setActiveEventIdx] = useState(0);
      useEffect(() => {
        if (!upcomingEvents || upcomingEvents.length <= 1) return;
        const timer = setInterval(() => { setActiveEventIdx(prev => (prev + 1) % upcomingEvents.length); }, 10000);
        return () => clearInterval(timer);
      }, [upcomingEvents]);

      const getXueqiuUrl = (code) => {
         if (code.startsWith('us')) return `https://xueqiu.com/S/${code.slice(2).toUpperCase()}`;
         return `https://xueqiu.com/S/${code.toUpperCase()}`;
      };

      const queryPhoneLocationReal = async (phone) => {
        if(phone.length !== 11) return;
        setIsLocating(true); setPhoneLocation('查询中...');
        try {
           const res = await fetch(`https://api.vvhan.com/api/phone?tel=${phone}`);
           const data = await res.json();
           if (data.success && data.info) setPhoneLocation(`${data.info.prov} ${data.info.city}`.trim());
           else setPhoneLocation('未知号码');
        } catch(e) { setPhoneLocation('查询失败'); }
        finally { setIsLocating(false); }
      };

      const handlePhoneChange = (e) => {
        const val = e.target.value.replace(/\D/g, '').substring(0, 11);
        setNewClient({...newClient, phone: val});
        setPhoneError('');
        if (queryTimeoutRef.current) clearTimeout(queryTimeoutRef.current);
        if(val.length === 11) queryTimeoutRef.current = setTimeout(() => queryPhoneLocationReal(val), 600);
        else setPhoneLocation('');
      };

      const handlePhoneBlur = () => {
        if (newClient.phone && newClient.phone.length !== 11) {
          setPhoneError('请输入11位手机号');
        } else {
          setPhoneError('');
        }
      };

      useEffect(() => { setCurrentMotto(MOTTO_LIST[Math.floor(Math.random() * MOTTO_LIST.length)]); const t = setInterval(() => setCurrentTime(new Date()), 1000); return () => clearInterval(t); }, []);

      useEffect(() => {
        if (!auth) return; setLoading(true);
        const initAuth = async () => {
          try { 
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
            else await signInAnonymously(auth); 
          } catch (err) { setLoading(false); }
        };
        initAuth();
        const unsubscribeAuth = onAuthStateChanged(auth, u => { setUser(u); if (!u) setLoading(false); });
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const colRef = doc(db, 'artifacts', appId || 'local', 'users', user.uid, 'dashboard', 'data_pro_v5');
        const unsubscribeSnap = onSnapshot(colRef, (snap) => {
          if (snap.exists()) {
            const d = snap.data();
            if (d.allMonthData) setAllMonthData(d.allMonthData);
            if (d.tasksCompleted) setTasksCompleted(d.tasksCompleted);
            if (d.clients) setClients(d.clients);
            if (d.portfolio) setPortfolio(d.portfolio); 
            if (d.investments) {
                if (d.investments.A && d.investments.US) setInvestments(d.investments);
                else setInvestments({ A: d.investments.records ? d.investments : { initialCapital: 1000000, records: {} }, US: { initialCapital: 100000, records: {} } });
            }
            if (d.expenses) setExpenses(d.expenses);
          }
          setLoading(false);
        }, () => setLoading(false));
        return () => unsubscribeSnap();
      }, [user]);

      const saveData = async (newData) => {
        if (newData.tasksCompleted) setTasksCompleted(newData.tasksCompleted);
        if (newData.allMonthData) setAllMonthData(newData.allMonthData);
        if (newData.clients) setClients(newData.clients);
        if (newData.investments) setInvestments(newData.investments);
        if (newData.expenses) setExpenses(newData.expenses);
        if (newData.portfolio) setPortfolio(newData.portfolio);
        if (!user || !db) return; 
        try { await setDoc(doc(db, 'artifacts', appId || 'local', 'users', user.uid, 'dashboard', 'data_pro_v5'), newData, { merge: true }); } 
        catch (e) { console.error(e); }
      };

      const requireAuth = (actionFn) => {
        return (...args) => {
          if (Date.now() - editAuthTime < 20 * 60 * 1000) actionFn(...args);
          else { setPendingAction(() => () => actionFn(...args)); setShowDataAuthModal(true); }
        };
      };

      const handleDataAuthSubmit = () => {
        if (dataAuthPwd === '000111') { setEditAuthTime(Date.now()); setShowDataAuthModal(false); setDataAuthPwd(''); if (pendingAction) { pendingAction(); setPendingAction(null); } } 
        else { setDataAuthPwd(''); setAuthErrorShake(true); setTimeout(() => setAuthErrorShake(false), 500); }
      };

      const handleTaskToggle = (tid) => {
        const isCompleted = tasksCompleted[tid];
        const action = () => { saveData({ tasksCompleted: { ...tasksCompleted, [tid]: !isCompleted } }); };
        if (isCompleted) requireAuth(action)(); else action(); 
      };

      const handleHabitToggle = (type, i) => {
        const isCompleted = currentMonthData.habits[type][i];
        const action = () => {
          const nextHabits = { ...currentMonthData.habits };
          nextHabits[type][i] = !isCompleted;
          saveData({ allMonthData: { ...allMonthData, [viewMonth]: { ...currentMonthData, habits: nextHabits } } });
        };
        if (isCompleted) requireAuth(action)(); else action();
      };

      const handleBizStatAdd = (field) => {
        const cur = [...(currentMonthData.bizStats[field] || [])]; cur.push(Date.now());
        saveData({ allMonthData: { ...allMonthData, [viewMonth]: { ...currentMonthData, bizStats: { ...currentMonthData.bizStats, [field]: cur } } } });
      };

      const handleBizStatRemove = (field) => {
        const action = () => {
           const cur = [...(currentMonthData.bizStats[field] || [])]; if (cur.length > 0) cur.pop(); 
           saveData({ allMonthData: { ...allMonthData, [viewMonth]: { ...currentMonthData, bizStats: { ...currentMonthData.bizStats, [field]: cur } } } });
        };
        requireAuth(action)();
      };

      const handleSmartParseExpense = () => {
         const match = newExpenseText.match(/(\d+(\.\d{1,2})?)/);
         if (match) {
             const amount = parseFloat(match[0]);
             let desc = newExpenseText.replace(match[0], '').trim();
             let type = expenseType;
             if (desc.includes('收入') || desc.includes('发工资') || desc.includes('赚') || desc.includes('进账')) type = 'in';
             if (!desc) desc = type === 'out' ? '日常消费' : '其他收入';
             saveExpense(amount, desc, type); setNewExpenseText('');
         } else alert('未识别到有效金额，请手动输入');
      };

      const handleManualExpenseAdd = () => {
         const amount = parseFloat(manualExpense.amount);
         if(amount > 0) {
             saveExpense(amount, manualExpense.desc || (expenseType === 'out' ? '日常消费' : '其他收入'), expenseType);
             setManualExpense({ amount: '', desc: '' });
         }
      };

      const saveExpense = (amount, desc, type = 'out') => {
         const d = new Date();

             <div className="h-full transition-all duration-700" style={{ width: `${progress}%`, backgroundColor: color }} />
          </div>
          <div className={`grid ${target === 8 ? 'grid-cols-4' : 'grid-cols-7'} gap-1.5`}>
            {slots.map(num => {
              const isSel = list ? list[num-1] : false;
              return (
                <div key={num} onClick={() => onToggle(num - 1)} className={`h-8 rounded-xl flex items-center justify-center text-[10px] font-black cursor-pointer transition-all duration-300 ${isSel ? 'scale-105 shadow-lg' : theme.habitBox}`} style={{ backgroundColor: isSel ? color : '', color: isSel ? (theme.isDark ? '#0f212e' : 'white') : theme.calendarNum }}>
                  {isSel ? '✓' : num}
                </div>
              );
            })}
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
