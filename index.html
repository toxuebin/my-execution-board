    const App = () => {
      const [isDarkMode, setIsDarkMode] = useState(() => new Date().getHours() >= 19 || new Date().getHours() < 7);
      const [currentTime, setCurrentTime] = useState(new Date());
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [currentMotto, setCurrentMotto] = useState("");
      const [authEmail, setAuthEmail] = useState("");
      const [authPassword, setAuthPassword] = useState("");
      const [authError, setAuthError] = useState("");
      const [authBusy, setAuthBusy] = useState(false);

      const doEmailLogin = async () => {
        if (!auth) return;
        setAuthError("");
        setAuthBusy(true);
        try {
          await signInWithEmailAndPassword(auth, authEmail.trim(), authPassword);
        } catch (e) {
          setAuthError(e?.message || "登录失败，请检查邮箱/密码");
        } finally {
          setAuthBusy(false);
        }
      };

      const doEmailSignup = async () => {
        if (!auth) return;
        setAuthError("");
        setAuthBusy(true);
        try {
          await createUserWithEmailAndPassword(auth, authEmail.trim(), authPassword);
        } catch (e) {
          setAuthError(e?.message || "注册失败，请稍后重试");
        } finally {
          setAuthBusy(false);
        }
      };

      const doLogout = async () => {
        if (!auth) return;
        try { await signOut(auth); } catch (e) {}
      };

      const LoginScreen = () => (
        <div className={`min-h-screen ${theme.bg} flex items-center justify-center p-6`}>

            <div className="space-y-3">

                className="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 outline-none"
                placeholder="邮箱"
                value={authEmail}
                onChange={(e) => setAuthEmail(e.target.value)}
                type="email"
                autoComplete="email"
              />
              <input
                className="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 outline-none"
                placeholder="密码（建议>=6位）"
                value={authPassword}
                onChange={(e) => setAuthPassword(e.target.value)}
                type="password"
                autoComplete="current-password"
              />

              {authError ? (
                <div className="text-sm text-red-600 dark:text-red-400">{authError}</div>
              ) : null}

                  className="px-4 py-3 rounded-xl bg-green-600 text-white font-semibold disabled:opacity-60"
                  onClick={doEmailLogin}
                  disabled={authBusy || !authEmail || !authPassword}
                >
                  {authBusy ? "处理中..." : "登录"}
                </button>
                <button
                  className="px-4 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-semibold disabled:opacity-60"
                  onClick={doEmailSignup}
                  disabled={authBusy || !authEmail || !authPassword}
                >
                  {authBusy ? "处理中..." : "注册"}

      const [showCalc, setShowCalc] = useState(false);
      const [calcInput, setCalcInput] = useState('0');

      const [expenseType, setExpenseType] = useState('out');
      const [newExpenseText, setNewExpenseText] = useState('');
      const [manualExpense, setManualExpense] = useState({ amount: '', desc: '' });
      const [investTab, setInvestTab] = useState('daily'); 
      const [investMarket, setInvestMarket] = useState('A');
      const [investModal, setInvestModal] = useState({ show: false, date: '', val: '' });

      const saveData = async (newData) => {
        if (newData.tasksCompleted !== undefined) { setTasksCompleted(newData.tasksCompleted); localStorage.setItem('tasksCompleted', JSON.stringify(newData.tasksCompleted)); }
        if (newData.allMonthData !== undefined) { setAllMonthData(newData.allMonthData); localStorage.setItem('allMonthData', JSON.stringify(newData.allMonthData)); }
        if (newData.clients !== undefined) { setClients(newData.clients); localStorage.setItem('clients', JSON.stringify(newData.clients)); }
        if (newData.investments !== undefined) { setInvestments(newData.investments); localStorage.setItem('investments', JSON.stringify(newData.investments)); }
        if (newData.expenses !== undefined) { setExpenses(newData.expenses); localStorage.setItem('expenses', JSON.stringify(newData.expenses)); }
        if (newData.portfolio !== undefined) { setPortfolio(newData.portfolio); localStorage.setItem('portfolio', JSON.stringify(newData.portfolio)); }

        if (user && db) {
          try { await setDoc(doc(db, 'artifacts', appId || 'local', 'users', user.uid, 'dashboard', 'data_pro_v5'), newData, { merge: true }); } 
          catch (e) { console.warn("Cloud Sync Delayed", e); }

      const handleCalcBtn = (val) => {
         if(val === 'C') { setCalcInput('0'); }
         else if(val === 'DEL') { setCalcInput(prev => prev.length > 1 ? prev.slice(0, -1) : '0'); }
         else if(val === '=') { try { setCalcInput(eval(calcInput.replace('×','*').replace('÷','/')).toString()); } catch(e) { setCalcInput('Error'); setTimeout(()=>setCalcInput('0'), 1000); } } 
         else { setCalcInput(prev => (prev === '0' || prev === 'Error') ? val : prev + val); }
      };

      useEffect(() => {
        fetch('https://api.exchangerate-api.com/v4/latest/USD').then(res => res.json())
          .then(data => { if(data && data.rates && data.rates.CNY) setUsdToCnyRate(data.rates.CNY); })
          .catch(() => console.log('使用默认汇率 7.2'));
      }, []);

      useEffect(() => {
         const fetchStocks = () => {
             const activeCodes = [...new Set([...portfolio.map(p => p.code), 'sh000001', 'usDJI'])];
             const script = document.createElement('script');
             script.src = `https://qt.gtimg.cn/q=${activeCodes.join(',')}&_t=${Date.now()}`;
             script.onload = () => {
                 const res = [];
                 activeCodes.forEach(code => {
                     const varName = `v_${code}`;
                     if(window[varName]) {
                         const data = window[varName].split('~');
                         if(data.length > 30) {
                             res.push({ code, name: data[1], price: data[3], change: data[31], changePct: data[32] });
                         }
                     }
                 });
                 if (res.length > 0) { setStockData(res); }
                 if (document.head.contains(script)) document.head.removeChild(script);
             };
             script.onerror = () => { if (document.head.contains(script)) document.head.removeChild(script); };
             document.head.appendChild(script);
         };
         fetchStocks();
         const interval = setInterval(fetchStocks, 6000); 
         return () => clearInterval(interval);
      }, [portfolio]);

      const autoSyncPnLValue = useMemo(() => {
          if (portfolio.length === 0 || stockData.length === 0) return 0;
          let todayTotal = 0;
          portfolio.filter(p => p.market === investMarket).forEach(item => {
              const sData = stockData.find(s => s.code === item.code);
              if (sData) {
                  const change = parseFloat(sData.change) || 0;
                  todayTotal += item.quantity * change;
              }
          });
          return todayTotal;
      }, [portfolio, stockData, investMarket]);

      useEffect(() => {
          if (autoSyncPnLValue === 0 || !user) return;
          const today = getTodayDateString();
          const dayOfWeek = new Date().getDay();
          if (dayOfWeek >= 1 && dayOfWeek <= 5) {
              const currentRecords = investments[investMarket]?.records || {};
              if (Math.abs((currentRecords[today] || 0) - autoSyncPnLValue) > 0.01) {
                  const updatedInvestments = { 
                      ...investments, 
                      [investMarket]: { 
                          ...investments[investMarket], 
                          records: { ...currentRecords, [today]: autoSyncPnLValue } 
                      } 
                  };
                  saveData({ investments: updatedInvestments });
              }
          }
      }, [autoSyncPnLValue, user]);

      useEffect(() => {
         const fetchNews = () => {
             const cbName = 'sinaNewsCb_' + Date.now();
             window[cbName] = (data) => { if(data && data.result && data.result.data) { setNewsList(data.result.data.slice(0, 6)); } delete window[cbName]; };
             const script = document.createElement('script');
             script.src = `https://feed.mix.sina.com.cn/api/roll/get?pageid=153&lid=2509&k=&num=10&page=1&callback=${cbName}&_t=${Date.now()}`;
             document.body.appendChild(script);
             setTimeout(() => { if(document.body.contains(script)) document.body.removeChild(script); }, 3000);
         };
         fetchNews();
         const interval = setInterval(fetchNews, 60000);
         return () => clearInterval(interval);
      }, []);

      const upcomingEvents = useMemo(() => {
        const today = currentTime;
        const allEvents = [...FAMILY_BIRTHDAYS, ...HOLIDAYS];
        const withDays = allEvents.map(e => {
            let eventDate = new Date(today.getFullYear(), e.month - 1, e.day);
            if (eventDate < new Date(today.getFullYear(), today.getMonth(), today.getDate())) { eventDate = new Date(today.getFullYear() + 1, e.month - 1, e.day); }
            const daysAway = Math.ceil((eventDate - today) / (1000 * 60 * 60 * 24));
            return { ...e, daysAway };
        }).sort((a,b) => a.daysAway - b.daysAway);
        return withDays.slice(0, 3); 
      }, [currentTime.getDate()]);

      const [activeEventIdx, setActiveEventIdx] = useState(0);
      useEffect(() => {
        if (!upcomingEvents || upcomingEvents.length <= 1) return;
        const timer = setInterval(() => { setActiveEventIdx(prev => (prev + 1) % upcomingEvents.length); }, 10000);
        return () => clearInterval(timer);
      }, [upcomingEvents]);

         if (code.startsWith('us')) return `https://xueqiu.com/S/${code.slice(2).toUpperCase()}`;
         return `https://xueqiu.com/S/${code.toUpperCase()}`;
      };

        if(phone.length !== 11) return;
        try {

                         </div>
                       ))}
                    </div>
                 </div>
               </div>
            </div>
          )}

          {showClientModal && (
            <div className="fixed inset-0 z-[70] flex items-end sm:items-center justify-center p-0 sm:p-4 bg-black/60 backdrop-blur-sm" onClick={(e) => { if(e.target === e.currentTarget) { setShowClientModal(false); setIsClientAuth(false); setActiveClientForFollowUp(null); } }}>
              <div className={`${theme.modalBg} rounded-t-[2rem] sm:rounded-[2rem] w-full max-w-3xl h-[90vh] sm:h-[85vh] shadow-2xl flex flex-col border ${isDarkMode ? 'border-[#213743]' : 'border border-gray-200'}`}>
                <div className={`p-4 border-b flex justify-between items-center ${isDarkMode ? 'border-[#213743]' : 'border-gray-200'}`}>
                   <h2 className={`text-lg font-bold ${theme.textMain}`}>客户中心</h2>
                   <div className="flex items-center gap-2">
                     {isClientAuth && <button onClick={handleExportData} className="p-2 bg-gray-100 rounded-lg text-xs font-bold">导出</button>}
                     <button onClick={() => { setShowClientModal(false); setIsClientAuth(false); }}><X className={`w-5 h-5 ${theme.textSub}`} /></button>
                   </div>
                </div>
                <div className="p-4 md:p-6 overflow-y-auto flex-1">
                  {!isClientAuth ? (
                    <div className="flex flex-col items-center py-12 gap-6">
                      <Lock className="w-16 h-16 text-gray-200" />
                      <div className="flex gap-2 w-full max-w-xs">
                        <input type="password" placeholder="解锁密码" value={clientPwdInput} onChange={(e) => setClientPwdInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleClientAuth()} className={`w-full px-4 py-3 rounded-xl border text-center ${theme.inputBg} ${theme.textMain}`} />
                        <button onClick={handleClientAuth} className="px-6 py-3 bg-purple-600 text-white font-bold rounded-xl shadow-md">解锁</button>
                      </div>
                    </div>
                  ) : activeClientForFollowUp ? (
                    <div className="space-y-6">
                        <button onClick={() => setActiveClientForFollowUp(null)} className="flex items-center gap-2 text-purple-500 font-bold"><ArrowLeft className="w-4 h-4" /> 返回列表</button>
                        <div className={`p-5 rounded-2xl border ${isDarkMode?'bg-[#0f212e] border-[#213743]':'bg-gray-50'}`}>
                           <div className={`text-xl font-bold ${theme.textMain}`}>{activeClientForFollowUp.name}</div>
                           <div className={`text-sm ${theme.textSub}`}>{activeClientForFollowUp.phone} {activeClientForFollowUp.location}</div>
                        </div>
                        <div className="flex gap-2">
                          <input type="text" placeholder="输入跟进记录..." value={newFollowUp} onChange={(e) => setNewFollowUp(e.target.value)} className={`flex-1 px-4 py-3 rounded-xl border ${theme.inputBg} ${theme.textMain}`} />
                          <button onClick={() => handleAddFollowUp(activeClientForFollowUp.id)} className="px-6 py-3 bg-purple-600 text-white font-bold rounded-xl">记录</button>
                        </div>
                        <div className="space-y-3">
                           {(activeClientForFollowUp.followUps || []).map((fu, idx) => (
                             <div key={fu.id || idx} className={`p-4 rounded-xl border ${isDarkMode?'bg-white/5 border-white/10':'bg-white border-gray-200 shadow-sm'}`}>
                                <div className="flex justify-between text-xs mb-1"><time className="font-mono text-purple-400">{fu.date}</time><button onClick={()=>handleDeleteFollowUp(activeClientForFollowUp.id, fu.id)} className="text-red-400"><Trash2 className="w-3.5 h-3.5"/></button></div>
                        <div className={`text-sm ${theme.textMain}`}>{fu.text}</div>
                      </div>
                    ))}
                 </div>
             </div>
           ) : crmTab === 'add' ? (
             <div className="space-y-4 max-w-md mx-auto">
                 <div className="flex flex-col gap-1">
                          <label className={`text-xs font-bold px-1 ${theme.textSub}`}>录入日期</label>
                          <input type="date" value={newClient.date} onChange={e => setNewClient({...newClient, date: e.target.value})} className={`w-full px-4 py-3 rounded-xl border ${theme.inputBg} ${theme.textMain}`} />
                        </div>
                        <input type="text" placeholder="姓名*" value={newClient.name} onChange={e => setNewClient({...newClient, name: e.target.value})} className={`w-full px-4 py-3 rounded-xl border ${theme.inputBg} ${theme.textMain}`} />
                        <input type="tel" placeholder="电话" value={newClient.phone} onChange={handlePhoneChange} className={`w-full px-4 py-3 rounded-xl border ${theme.inputBg} ${theme.textMain}`} />
                        <div className="flex flex-col gap-1">
                          <label className={`text-xs font-bold px-1 ${theme.textSub}`}>等级划分</label>
                          <select value={newClient.level} onChange={e => setNewClient({...newClient, level: e.target.value})} className={`w-full px-4 py-3 rounded-xl border ${theme.inputBg} ${theme.textMain}`}>
                              <option value="S">S级 (核心重点)</option>
                              <option value="A">A级 (高价值)</option>
                              <option value="B">B级 (普通客户)</option>
                              <option value="C">C级 (备用记录)</option>
                          </select>
                        </div>
                        <button onClick={handleAddClient} className="w-full mt-2 py-4 bg-purple-600 text-white font-bold rounded-xl shadow-lg">保存客户资料</button>
                        <button onClick={()=>setCrmTab('list')} className="w-full py-2 text-sm text-gray-500 font-bold">返回列表</button>
                    </div>
                  ) : (
                    <div className="space-y-3">
                      <button onClick={()=>setCrmTab('add')} className="w-full py-3 bg-purple-100 text-purple-600 font-bold rounded-xl mb-4">+ 新增录入</button>
                      {sortedClients.map(client => (
                        <div key={client.id} onClick={() => setActiveClientForFollowUp(client)} className={`flex items-center justify-between p-4 rounded-2xl border cursor-pointer ${client.level === 'S' ? (isDarkMode ? 'border-yellow-600 bg-yellow-900/10' : 'border-yellow-400 bg-yellow-50') : (isDarkMode ? 'bg-[#0f212e] border-[#213743]' : 'bg-white border-gray-200 shadow-sm')}`}>
                          <div className="flex items-center gap-4">
                            <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-white ${client.level === 'S' ? 'bg-yellow-500' : 'bg-purple-500'}`}>
                               {client.level}
                            </div>
                            <div>
                                <div className={`font-bold ${theme.textMain}`}>{client.name}</div>
                                <div className={`text-xs ${theme.textSub}`}>{client.phone} · {client.date}</div>
                            </div>
                          </div>
                          <ChevronRight className="w-4 h-4 text-gray-400" />
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          {showPortfolioModal && (
            <div className="fixed inset-0 z-[90] flex items-center justify-center p-4 bg-black/60" onClick={(e) => { if(e.target === e.currentTarget) { setShowPortfolioModal(false); } }}>
              <div className={`${theme.modalBg} p-6 rounded-[2rem] w-full max-w-sm shadow-2xl border ${isDarkMode ? 'border-[#213743]' : ''}`}>
                <h3 className={`text-lg font-bold mb-4 ${theme.textMain}`}>录入持仓</h3>
                <div className="space-y-4 mb-6">
                   <input type="text" placeholder="代码(如: sh600519)" value={newPosition.code} onChange={e=>setNewPosition({...newPosition, code: e.target.value})} className={`w-full px-4 py-3 rounded-xl border ${theme.inputBg} ${theme.textMain}`} />
                   <input type="number" placeholder="数量" value={newPosition.quantity} onChange={e=>setNewPosition({...newPosition, quantity: e.target.value})} className={`w-full px-4 py-3 rounded-xl border ${theme.inputBg} ${theme.textMain}`} />
                   <input type="number" placeholder="成本价" value={newPosition.costPrice} onChange={e=>setNewPosition({...newPosition, costPrice: e.target.value})} className={`w-full px-4 py-3 rounded-xl border ${theme.inputBg} ${theme.textMain}`} />
                </div>
                <button onClick={handleAddPosition} className="w-full py-3 bg-red-600 text-white font-bold rounded-xl">确定</button>
              </div>
            </div>
          )}

          {showCalc && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60" onClick={(e) => { if(e.target === e.currentTarget) setShowCalc(false); }}>
              <div className={`${theme.modalBg} p-5 rounded-[2rem] w-full max-w-xs shadow-2xl border ${isDarkMode ? 'border-[#213743]' : ''}`}>
                <div className={`w-full h-16 rounded-xl mb-4 px-4 flex items-center justify-end text-3xl font-black font-mono overflow-x-auto ${isDarkMode?'bg-[#0f212e] text-white':'bg-gray-100 text-gray-900'}`}>{calcInput}</div>
                <div className="grid grid-cols-4 gap-2">
                   {['C','DEL','%','÷','7','8','9','×','4','5','6','-','1','2','3','+','00','0','.','='].map((btn, i) => (
                      <button key={i} onClick={() => handleCalcBtn(btn)} className={`h-12 rounded-xl text-lg font-bold ${['÷','×','-','+','='].includes(btn) ? 'bg-orange-500 text-white' : (isDarkMode?'bg-[#1a2c38] text-white shadow-md':'bg-white text-gray-900 border')}`}>{btn}</button>
                   ))}
                </div>
              </div>
            </div>
          )}

          {showDataAuthModal && (
            <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
              <div className={`${theme.modalBg} p-6 rounded-[2rem] w-full max-w-sm shadow-2xl flex flex-col items-center border ${isDarkMode ? 'border-[#213743]' : ''}`}>
                <Lock className="w-8 h-8 text-red-500 mb-4" />
                <h2 className={`text-xl font-bold mb-6 ${theme.textMain}`}>权限验证</h2>
                <div className={`w-full flex ${authErrorShake ? 'animate-[shake_0.5s_ease-in-out]' : ''}`}>
                   <input type="password" placeholder="操作密码" value={dataAuthPwd} onChange={(e) => setDataAuthPwd(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleDataAuthSubmit()} className={`flex-1 px-4 py-3 rounded-l-xl border text-center ${theme.inputBg} ${theme.textMain}`} />
                   <button onClick={handleDataAuthSubmit} className="px-6 py-3 bg-red-600 text-white font-bold rounded-r-xl">验证</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const HabitGrid = ({ label, target, list, onToggle, theme, color, icon }) => {
      const slots = Array.from({ length: target === 8 ? 8 : 31 }, (_, i) => i + 1);
      const current = list ? list.filter(Boolean).length : 0;
      return (
        <div className={`p-4 rounded-[1.5rem] ${theme.isDark ? 'bg-black/10' : 'bg-slate-50/50'}`}>
          <div className="flex justify-between items-center mb-2"><span className={`text-xs font-black flex items-center gap-1.5 ${theme.textSub}`}>{icon} {label}</span><span className={`text-sm font-bold ${theme.textMain}`}>{current}/{target}</span></div>
          <div className={`grid ${target === 8 ? 'grid-cols-4' : 'grid-cols-7'} gap-1.5`}>
            {slots.map(num => {
              const isSel = list ? list[num-1] : false;
              return (
                <div key={num} onClick={() => onToggle(num - 1)} className={`h-8 rounded-xl flex items-center justify-center text-[10px] font-black cursor-pointer transition-all ${isSel ? 'scale-105 shadow-md' : theme.habitBox}`} style={{ backgroundColor: isSel ? color : '', color: isSel ? 'white' : theme.calendarNum }}>{isSel ? '✓' : num}</div>
              );
            })}
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

<script>
/* ===== SIMPLE PERSONAL CLOUD SYNC (NO FIREBASE) ===== */
let syncEnabled = false;
let syncKey = localStorage.getItem("SIMPLE_SYNC_KEY") || "";
let endpointBase = "https://api.npoint.io/"; 

function openSyncSettings(){
  const key = prompt("输入你的同步密钥（自己设一个，例如 refo2026）：", syncKey || "");
  if(!key) return;
  syncKey = key.trim();
  localStorage.setItem("SIMPLE_SYNC_KEY", syncKey);
  alert("同步密钥已保存。现在请告诉我你的 npoint endpoint ID（如果没有我会提示你创建）。");
  const ep = prompt("请输入你的 npoint endpoint ID（例如 abc123xyz ）：", localStorage.getItem("SIMPLE_SYNC_EP") || "");
  if(!ep) return;
  localStorage.setItem("SIMPLE_SYNC_EP", ep.trim());
  syncEnabled = true;
  alert("同步已启用。刷新页面后生效。");
}

async function cloudSave(data){
  if(!syncEnabled) return;
  const ep = localStorage.getItem("SIMPLE_SYNC_EP");
  if(!ep) return;
  try{
    await fetch(endpointBase + ep, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ key: syncKey, payload: data })
    });
  }catch(e){ console.log("Cloud save failed"); }
}

async function cloudLoad(){
  const ep = localStorage.getItem("SIMPLE_SYNC_EP");
  if(!ep) return null;
  try{
    const r = await fetch(endpointBase + ep);
    const j = await r.json();
    if(j.key === syncKey) return j.payload;
  }catch(e){}
  return null;
}

window.addEventListener("load", async ()=>{
  if(localStorage.getItem("SIMPLE_SYNC_EP") && syncKey){
    syncEnabled = true;
    const data = await cloudLoad();
    if(data){
      localStorage.setItem("executionBoardData", JSON.stringify(data));
      location.reload();
    }
  }
});

window.simpleCloudSave = cloudSave;
window.simpleCloudSettings = openSyncSettings;
</script>
