                              <div className="md:col-span-1 space-y-4 sm:space-y-6">
                                  <div className={`p-4 sm:p-5 rounded-2xl border shadow-inner ${isDarkMode ? 'bg-[#0f172a] border-[#334155]' : 'bg-slate-50 border-gray-100'}`}>
                                      <h3 className={`text-sm font-bold mb-4 flex items-center gap-2 ${theme.textMain}`}><FileText className="w-4 h-4 text-indigo-500"/> 核心指标</h3>
                                      <div className="space-y-4">
                                          <div>
                                              <p className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-widest ${theme.textSub}`}>参考均价</p>
                                              <p className="font-bold text-lg sm:text-xl text-red-500 font-mono">{selectedProject.price || '--'}</p>
                                          </div>
                                          <div className="flex justify-between">
                                              <div>
                                                  <p className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-widest ${theme.textSub}`}>主力户型</p>
                                                  <p className={`font-bold font-mono text-base sm:text-lg ${theme.textMain}`}>{selectedProject.area || '--'} ㎡</p>
                                              </div>
                                              <div className="text-right">
                                                  <p className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-widest ${theme.textSub}`}>总套数</p>
                                                  <p className={`font-bold font-mono text-base sm:text-lg ${theme.textMain}`}>{selectedProject.totalUnits || '--'}</p>
                                              </div>
                                          </div>
                                      </div>
                                  </div>

                                  {selectedProject.masterPlans && selectedProject.masterPlans.length > 0 && (
                                      <div className="md:hidden">
                                          <h3 className={`text-sm font-bold mb-3 flex items-center gap-2 ${theme.textMain}`}><Map className="w-4 h-4 text-emerald-500"/> 总平图</h3>
                                          <div className="grid grid-cols-2 gap-2">
                                              {selectedProject.masterPlans.map((url, idx) => (
                                                  <div key={idx} className={`rounded-xl overflow-hidden border ${theme.card} aspect-video shadow-sm`}><img src={url} className="w-full h-full object-cover" /></div>
                                              ))}
                                          </div>
                                      </div>
                                  )}
                              </div>

                              <div className="md:col-span-2">
                                  {selectedProject.masterPlans && selectedProject.masterPlans.length > 0 && (
                                      <div className="hidden md:block mb-8">
                                          <h3 className={`text-base font-bold mb-4 flex items-center gap-2 ${theme.textMain}`}><Map className="w-5 h-5 text-emerald-500"/> 项目总平图 / 鸟瞰图</h3>
                                          <div className="grid grid-cols-2 gap-4">
                                              {selectedProject.masterPlans.map((url, idx) => (
                                                  <div key={idx} className={`rounded-xl overflow-hidden border ${theme.card} relative aspect-video shadow-sm`}><img src={url} className="w-full h-full object-cover bg-white dark:bg-black/50" /></div>
                                              ))}
                                          </div>
                                      </div>
                                  )}

                                  <div className="flex justify-between items-center mb-3 sm:mb-4 mt-4 md:mt-0">
                                      <h3 className={`text-base sm:text-lg font-bold flex items-center gap-2 ${theme.textMain}`}><ImageIcon className="w-5 h-5 text-indigo-500"/> 主力户型图册</h3>
                                  </div>
                                  {(!selectedProject.floorPlans || selectedProject.floorPlans.length === 0) ? (
                                      <div className={`h-40 sm:h-64 rounded-2xl border-2 border-dashed flex flex-col items-center justify-center ${isDarkMode ? 'border-[#334155] text-slate-500' : 'border-gray-200 text-gray-400'}`}>
                                          <ImageIcon className="w-10 h-10 sm:w-12 sm:h-12 mb-2 opacity-20" />
                                          <p className="text-xs sm:text-sm">暂未上传户型图</p>
                                      </div>
                                  ) : (
                                      <div className="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4">
                                          {selectedProject.floorPlans.map((plan, idx) => {
                                              const isString = typeof plan === 'string';
                                              const url = isString ? plan : plan.url;
                                              const area = isString ? '' : plan.area;
                                              return (
                                              <div key={idx} className={`rounded-xl overflow-hidden border ${theme.card} relative aspect-[3/4] shadow-sm group`}>
                                                  <img src={url} alt={`户型图 ${idx+1}`} className="w-full h-full object-contain bg-white dark:bg-black/50" />
                                                  {area && (
                                                      <div className="absolute bottom-0 left-0 right-0 bg-black/70 backdrop-blur-sm text-white text-center py-1.5 text-xs font-bold font-mono tracking-widest">
                                                          约 {area} ㎡
                                                      </div>
                                                  )}
                                              </div>
                                          )})}
                                      </div>
                                  )}
                              </div>
                          </div>
                      </div>
                  </div>
              )}
          </div>
      );

      return (
        <div className={`min-h-screen flex flex-col md:flex-row ${theme.bg} transition-colors duration-500`}>
          <header className={`md:hidden flex justify-between items-center p-4 border-b z-30 shrink-0 ${isDarkMode ? 'bg-[#1e293b] border-[#334155]' : 'bg-white border-gray-200 shadow-sm'}`}>
              <div className={`flex items-center gap-2 font-black text-lg ${theme.textMain}`}>
                  <Building2 className="w-5 h-5 text-purple-500"/> 地产精英
              </div>
              <div className="flex items-center gap-3">
                  <button onClick={() => setIsDarkMode(!isDarkMode)} className={`p-1.5 rounded-lg ${isDarkMode ? 'text-yellow-400 bg-yellow-400/10' : 'text-slate-500 bg-slate-100'}`}>
                      {isDarkMode ? <LucideIcons.Sun className="w-4 h-4" /> : <LucideIcons.Moon className="w-4 h-4" />}
                  </button>
                  <button onClick={() => setIsLocked(true)} className={`p-1.5 rounded-lg text-red-500 bg-red-50 dark:bg-red-500/10`}>
                      <Key className="w-4 h-4" />
                  </button>
              </div>
          </header>

          <aside className={`hidden md:flex w-20 lg:w-64 h-screen shrink-0 border-r flex-col justify-between z-20 transition-all duration-300 ${isDarkMode ? 'bg-[#1e293b] border-[#334155]' : 'bg-white border-gray-200 shadow-[4px_0_24px_rgba(0,0,0,0.02)]'}`}>
             <div className="p-4 lg:p-6 flex flex-col items-center lg:items-start">
                 <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-purple-500 to-indigo-600 flex items-center justify-center text-white shadow-lg mb-8">
                     <Building2 className="w-6 h-6" strokeWidth={2.5}/>
                 </div>
                 
                 <nav className="w-full space-y-2 lg:space-y-3">
                     {[
                         { id: 'dashboard', icon: LayoutDashboard, label: '工作台' },
                         { id: 'clients', icon: Users, label: '客户管理' },
                         { id: 'projects', icon: MapPin, label: '楼盘字典' }
                     ].map(item => {
                         const Icon = item.icon;
                         const isActive = activeTab === item.id;
                         return (
                             <button key={item.id} onClick={() => { setActiveTab(item.id); setSelectedClient(null); setSelectedProject(null); setIsEditing(false); setSearchQuery(''); setErrorMsg(null); setReminderMode('preset'); }} className={`w-full flex items-center justify-center lg:justify-start gap-3 p-3 lg:px-4 lg:py-3.5 rounded-2xl transition-all ${isActive ? (isDarkMode ? 'bg-purple-500/20 text-purple-400' : 'bg-purple-50 text-purple-600 font-bold shadow-sm') : `text-slate-400 hover:${isDarkMode ? 'bg-slate-800' : 'bg-slate-50'}`}`}>
                                 <Icon className="w-6 h-6 lg:w-5 lg:h-5" />
                                 <span className="hidden lg:block text-sm">{item.label}</span>
                             </button>
                         )
                     })}
                 </nav>
             </div>
             
             <div className="p-4 lg:p-6 space-y-3">
                 <button onClick={() => setIsDarkMode(!isDarkMode)} className={`w-full flex items-center justify-center lg:justify-start gap-3 p-3 rounded-2xl text-slate-400 hover:${isDarkMode ? 'bg-slate-800' : 'bg-slate-50'} transition-all`}>
                     {isDarkMode ? <LucideIcons.Sun className="w-6 h-6 lg:w-5 lg:h-5" /> : <LucideIcons.Moon className="w-6 h-6 lg:w-5 lg:h-5" />}
                     <span className="hidden lg:block text-sm font-medium">{isDarkMode ? '切换日间' : '切换夜间'}</span>
                 </button>
                 <button onClick={() => setIsLocked(true)} className={`w-full flex items-center justify-center lg:justify-start gap-3 p-3 rounded-2xl text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all`}>
                     <Key className="w-6 h-6 lg:w-5 lg:h-5" />
                     <span className="hidden lg:block text-sm font-medium">锁定系统</span>
                 </button>
             </div>
          </aside>

          <main className="flex-1 h-full md:h-screen overflow-hidden flex flex-col relative z-10">
              {loading && <div className="absolute inset-0 z-50 bg-black/10 backdrop-blur-sm flex items-center justify-center"><LucideIcons.Loader2 className="w-8 h-8 md:w-10 md:h-10 text-purple-500 animate-spin" /></div>}
              <div className="flex-1 p-4 sm:p-6 lg:p-10 overflow-y-auto w-full max-w-[100vw]">
                  {activeTab === 'dashboard' && renderDashboard()}
                  {activeTab === 'clients' && renderClients()}
                  {activeTab === 'projects' && renderProjects()}
              </div>
          </main>

          <nav className={`md:hidden fixed bottom-0 left-0 right-0 z-40 border-t flex justify-around items-center px-2 pt-2 pb-safe ${isDarkMode ? 'bg-[#1e293b]/95 border-[#334155]' : 'bg-white/95 border-gray-200'} backdrop-blur-md`}>
              {[
                  { id: 'dashboard', icon: LayoutDashboard, label: '工作台' },
                  { id: 'clients', icon: Users, label: '客户管理' },
                  { id: 'projects', icon: MapPin, label: '楼盘字典' }
              ].map(item => {
                  const Icon = item.icon;
                  const isActive = activeTab === item.id;
                  return (
                      <button key={item.id} onClick={() => { setActiveTab(item.id); setSelectedClient(null); setSelectedProject(null); setIsEditing(false); setSearchQuery(''); setErrorMsg(null); setReminderMode('preset'); }} className={`flex flex-col items-center gap-1 p-2 w-20 transition-colors ${isActive ? (isDarkMode ? 'text-purple-400' : 'text-purple-600') : 'text-slate-400'}`}>
                          <Icon className={`w-5 h-5 ${isActive ? 'animate-bounce' : ''}`} style={{ animationIterationCount: 1 }} />
                          <span className={`text-[10px] font-bold ${isActive ? '' : 'font-normal'}`}>{item.label}</span>
                      </button>
                  )
              })}
          </nav>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
