<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>地产精英 | 专属客户与项目管理系统</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
  <script async src="https://cdn.jsdelivr.net/npm/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?bundle&external=react",
        "otpauth": "https://esm.sh/otpauth@9.3.1"
      }
    }
  </script>
  
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 4px; height: 4px; display: none; }
    @media (min-width: 768px) { ::-webkit-scrollbar { display: block; } }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark-mode { background-color: #0f172a; color: #f1f5f9; }
    .dark-mode ::-webkit-scrollbar-thumb { background: #334155; }
    .glass { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
    @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 16px); }
    .hide-scroll::-webkit-scrollbar { display: none; }
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }
    .dark-mode input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from 'firebase/auth';
    import { getFirestore, doc, setDoc, onSnapshot } from 'firebase/firestore';
    import * as LucideIcons from 'lucide-react';
    import * as OTPAuth from 'otpauth';
    
    const {
      Lock, Unlock, Users, Building2, LayoutDashboard, Calendar, Search, Plus, X, 
      Phone, MapPin, Edit, Trash2, ChevronRight, Clock, AlertCircle,
      TrendingUp, DollarSign, ImageIcon, ExternalLink, FileText,
      Target, Briefcase, PhoneCall, Key, UploadCloud, Share2, Copy, Check, Map, UserCheck, DownloadCloud
    } = LucideIcons;

    const SALESPERSONS = ['钱学斌（管理员）', '步飞', '周薇', '周洋', '其他'];
    const EXPORT_PWD = '18668375888a';

    const userDefaultConfig = {
      apiKey: "AIzaSyD7zuS6Ntz0KMWR9-By7frlKfzmxTUwX7s",
      authDomain: "rizers-5d385.firebaseapp.com",
      projectId: "rizers-5d385",
      storageBucket: "rizers-5d385.firebasestorage.app",
      messagingSenderId: "82696904275",
      appId: "1:82696904275:web:2e390842674a9e0afa30a6",
      measurementId: "G-5QWRNPHNPY"
    };
    const defaultSyncKey = "Qianxuebin20120903";

    let storedConfig = null;
    try { 
      let parsed = JSON.parse(localStorage.getItem('customFirebaseConfig')); 
      if (parsed && parsed.apiKey) storedConfig = parsed;
    } catch(e){}
    
    let canvasConfig = null;
    try {
        if (typeof __firebase_config !== 'undefined' && __firebase_config) {
            canvasConfig = JSON.parse(__firebase_config);
        }
    } catch(e) {}
    const firebaseConfig = canvasConfig || storedConfig || userDefaultConfig;
    
    let firebaseApp, auth, db, appId, isCanvasEnv;
    if (Object.keys(firebaseConfig).length > 0 && firebaseConfig.apiKey) {
      try { 
        firebaseApp = initializeApp(firebaseConfig); 
        auth = getAuth(firebaseApp); 
        db = getFirestore(firebaseApp); 
        isCanvasEnv = typeof __app_id !== 'undefined';
        appId = isCanvasEnv ? __app_id : 'standalone-app'; 
      } catch (e) { console.warn("Firebase 初始化失败", e); }
    }

    const App = () => {
      const [isDarkMode, setIsDarkMode] = useState(() => new Date().getHours() >= 19 || new Date().getHours() < 7);
      const [isLocked, setIsLocked] = useState(true);
      const [pwdInput, setPwdInput] = useState('');
      const [shake, setShake] = useState(false);
      
      const [activeTab, setActiveTab] = useState('dashboard');
      
      const [user, setUser] = useState(null);
      const [syncDocId, setSyncDocId] = useState(null);
      const [loading, setLoading] = useState(true);
      
      const [clients, setClients] = useState([]);
      const [projects, setProjects] = useState([]);

      const [searchQuery, setSearchQuery] = useState('');
      const [selectedClient, setSelectedClient] = useState(null);
      const [selectedProject, setSelectedProject] = useState(null);
      const [isEditing, setIsEditing] = useState(false);
      const [editFormData, setEditFormData] = useState({ floorPlans: [], masterPlans: [] });
      const [isUploading, setIsUploading] = useState({ floorPlans: false, masterPlans: false });

      const [showExportModal, setShowExportModal] = useState(false);
      const [showDeleteConfirm, setShowDeleteConfirm] = useState(null); // id of client to delete
      const [exportPwdInput, setExportPwdInput] = useState('');
      const [exportShake, setExportShake] = useState(false);
      const [errorMsg, setErrorMsg] = useState(null); // For duplicate phone alert
      
      const [exportAuthMode, setExportAuthMode] = useState('password'); 
      const [totpInput, setTotpInput] = useState('');
      const TOTP_SECRET = "QIANXUEBINCQM234";

      // State for reminder type in the follow-up form
      const [reminderMode, setReminderMode] = useState('preset');

      const totp = useMemo(() => new OTPAuth.TOTP({
          issuer: "地产精英CRM",
          label: "管理员",
          algorithm: "SHA1",
          digits: 6,
          period: 30,
          secret: OTPAuth.Secret.fromBase32(TOTP_SECRET)
      }), []);

      useEffect(() => {
        if (isDarkMode) document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');
      }, [isDarkMode]);

      useEffect(() => {
        let unsubscribeAuth = () => {};
        const initAuth = async () => {
          try {
            if (!auth) { setLoading(false); return; }
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else { await signInAnonymously(auth); }
            unsubscribeAuth = onAuthStateChanged(auth, u => { setUser(u); if (!u) setLoading(false); });
          } catch (err) { setLoading(false); }
        };
        initAuth();
        return () => unsubscribeAuth();
      }, []);

      useEffect(() => {
        if (!user) return;
        const initDocId = async () => {
          try {
              if (isCanvasEnv) { setSyncDocId(user.uid); } 
              else {
                 const key = localStorage.getItem('customSyncKey') || defaultSyncKey;
                 if (window.crypto && window.crypto.subtle) {
                     const msgBuffer = new TextEncoder().encode(key);                    
                     const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                     const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
                     setSyncDocId(hashHex);
                 } else { setSyncDocId('doc_' + btoa(encodeURIComponent(key)).replace(/[^a-zA-Z0-9]/g, '').substring(0, 30)); }
              }
          } catch (err) { setSyncDocId('fallback_dashboard_id'); }
        };
        initDocId();
      }, [user]);

      useEffect(() => {
        if (!user || !db || !syncDocId) return;
        const docRef = isCanvasEnv ? doc(db, 'artifacts', appId, 'users', syncDocId, 'dashboard', 'data_pro_v5') : doc(db, 'users', 'standalone', 'dashboards', syncDocId);
        const unsubscribeSnap = onSnapshot(docRef, (snap) => {
          if (snap.exists()) {
            const d = snap.data();
            if (d.clients) setClients(d.clients);
            if (d.realEstateProjects) setProjects(d.realEstateProjects);
          }
          setLoading(false);
        }, () => setLoading(false));
        return () => unsubscribeSnap();
      }, [user, syncDocId]);

      const saveData = async (newData) => {
        if (newData.clients !== undefined) setClients(newData.clients);
        if (newData.realEstateProjects !== undefined) setProjects(newData.realEstateProjects);
        if (user && db && syncDocId) {
          try { 
            const docRef = isCanvasEnv ? doc(db, 'artifacts', appId, 'users', syncDocId, 'dashboard', 'data_pro_v5') : doc(db, 'users', 'standalone', 'dashboards', syncDocId);
            await setDoc(docRef, newData, { merge: true }); 
          } catch (e) { console.warn("Cloud Sync Delayed", e); }
        }
      };

      const handleUnlock = () => {
        // Updated: Only 20120903 is allowed now. 000111 is removed.
        if (pwdInput === '20120903') { setIsLocked(false); setPwdInput(''); } 
        else { setShake(true); setTimeout(() => setShake(false), 500); setPwdInput(''); }
      };

      const theme = {
        bg: isDarkMode ? 'bg-[#0f172a]' : 'bg-[#f3f4f6]',
        card: isDarkMode ? 'bg-[#1e293b] border-[#334155]' : 'bg-white border-gray-200',
        textMain: isDarkMode ? 'text-slate-100' : 'text-slate-900',
        textSub: isDarkMode ? 'text-slate-400' : 'text-slate-500',
        inputBg: isDarkMode ? 'bg-[#0f172a] border-[#334155]' : 'bg-slate-50 border-slate-200',
        primary: 'bg-purple-600 hover:bg-purple-700 text-white',
        primaryText: isDarkMode ? 'text-purple-400' : 'text-purple-600',
      };

      const getTodayString = () => {
        const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      };

      const compressImage = (file) => {
          return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.readAsDataURL(file);
              reader.onload = (event) => {
                  const img = new Image();
                  img.src = event.target.result;
                  img.onload = () => {
                      const canvas = document.createElement('canvas');
                      const MAX_WIDTH = 800; 
                      let width = img.width; let height = img.height;
                      if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                      canvas.width = width; canvas.height = height;
                      const ctx = canvas.getContext('2d');
                      ctx.drawImage(img, 0, 0, width, height);
                      resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                  };
                  img.onerror = (err) => reject(err);
              };
          });
      };

      const handleImageUpload = async (e, field) => {
          const files = Array.from(e.target.files);
          if (files.length === 0) return;
          setIsUploading(prev => ({ ...prev, [field]: true }));
          try {
              const compressedImages = await Promise.all(files.map(file => compressImage(file)));
              
              if (field === 'floorPlans') {
                  const newFloorPlans = compressedImages.map(url => ({ url, area: '' }));
                  setEditFormData(prev => ({ ...prev, floorPlans: [...(prev.floorPlans || []), ...newFloorPlans] }));
              } else {
                  setEditFormData(prev => ({ ...prev, [field]: [...(prev[field] || []), ...compressedImages] }));
              }
          } catch (err) { alert("图片处理失败，请重试"); } finally {
              setIsUploading(prev => ({ ...prev, [field]: false }));
          }
      };

      const removeImage = (field, indexToRemove) => {
          setEditFormData(prev => ({ ...prev, [field]: prev[field].filter((_, index) => index !== indexToRemove) }));
      };

      const handleFloorPlanAreaChange = (index, value) => {
          const newFloorPlans = [...(editFormData.floorPlans || [])];
          newFloorPlans[index] = { ...newFloorPlans[index], area: value };
          setEditFormData({ ...editFormData, floorPlans: newFloorPlans });
      };

      const prepareEditProject = (proj) => {
          const processedProj = { ...proj };
          if (processedProj.floorPlans && processedProj.floorPlans.length > 0) {
              processedProj.floorPlans = processedProj.floorPlans.map(fp => {
                  return typeof fp === 'string' ? { url: fp, area: '' } : fp;
              });
          } else {
              processedProj.floorPlans = [];
          }
          setEditFormData(processedProj);
          setIsEditing(true);
      };

      const saveClient = () => {
        if (!editFormData.name) return alert("客户姓名必填");
        
        // Check for duplicate phone
        if (editFormData.phone && editFormData.phone.trim()) {
            const normalizedPhone = editFormData.phone.trim();
            const isDuplicate = clients.some(c => 
                c.phone === normalizedPhone && c.id !== editFormData.id
            );
            if (isDuplicate) {
                const dupClient = clients.find(c => c.phone === normalizedPhone);
                setErrorMsg(`该手机号已存在！属于客户：${dupClient.name}`);
                return;
            }
        }

        let newClients = [...clients];
        if (editFormData.id) {
            newClients = newClients.map(c => c.id === editFormData.id ? { ...c, ...editFormData } : c);
        } else {
            newClients = [{ id: Date.now().toString(), date: getTodayString(), ...editFormData, followUps: [] }, ...newClients];
        }
        saveData({ clients: newClients });
        setIsEditing(false);
        setErrorMsg(null);
        if (editFormData.id) setSelectedClient(newClients.find(c => c.id === editFormData.id));
      };

      const deleteClient = (id) => {
          const updatedClients = clients.filter(c => c.id !== id);
          saveData({ clients: updatedClients });
          setSelectedClient(null);
          setShowDeleteConfirm(null);
      };

      const addFollowUp = (clientId, text, nextRemindInput) => {
        if (!text.trim()) return;
        const now = new Date();
        const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        
        let nextRemindDateStr = null;
        if (nextRemindInput === '0' || !nextRemindInput) {
            nextRemindDateStr = null;
        } else if (nextRemindInput.includes('-')) {
            // It's a specific date string (YYYY-MM-DD)
            nextRemindDateStr = nextRemindInput;
        } else {
            // It's a preset number of days
            const remindDate = new Date(); 
            remindDate.setDate(remindDate.getDate() + parseInt(nextRemindInput));
            nextRemindDateStr = `${remindDate.getFullYear()}-${String(remindDate.getMonth() + 1).padStart(2, '0')}-${String(remindDate.getDate()).padStart(2, '0')}`;
        }
        
        const newRecord = { id: Date.now().toString(), date: dateStr, text, type: 'follow' };
        
        const updatedClients = clients.map(c => {
            if (c.id === clientId) return { ...c, nextRemindDate: nextRemindDateStr || c.nextRemindDate, followUps: [newRecord, ...(c.followUps || [])] };
            return c;
        });
        saveData({ clients: updatedClients });
        setSelectedClient(updatedClients.find(c => c.id === clientId));
        setReminderMode('preset'); // Reset UI state
      };

      const handleExportClients = (bypassPwd = false) => {
          if (bypassPwd || exportPwdInput === EXPORT_PWD) {
              setExportPwdInput('');
              setTotpInput('');
              setShowExportModal(false);
              setExportAuthMode('password');
              
              if (clients.length === 0) {
                  alert("暂无客户数据可导出"); return;
              }

              let csvContent = "录入日期,客户姓名,联系电话,意向等级,归属业务员,购房目的,购房预算(万),意向板块,下次提醒日期,最新跟进记录\n";
              
              filteredClients.forEach(c => {
                  const latestFollowUp = c.followUps && c.followUps.length > 0 ? c.followUps[0].text.replace(/"/g, '""').replace(/\n/g, ' ') : '';
                  csvContent += `"${c.date}","${c.name}","${c.phone || ''}","${c.level}","${c.salesperson || '钱学斌（管理员）'}","${c.type || ''}","${c.budget || ''}","${c.intentArea || ''}","${c.nextRemindDate || ''}","${latestFollowUp}"\n`;
              });

              const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
              const link = document.createElement("a"); 
              link.setAttribute("href", URL.createObjectURL(blob)); 
              link.setAttribute("download", `客户资产库导出_${getTodayString()}.csv`);
              document.body.appendChild(link); link.click(); document.body.removeChild(link);
          } else {
              setExportPwdInput('');
              setTotpInput('');
              setExportShake(true);
              setTimeout(() => setExportShake(false), 500);
          }
      };

      const handleTotpVerify = () => {
          const isValid = totp.validate({ token: totpInput, window: 1 }) !== null;
          if (isValid) {
              handleExportClients(true);
          } else {
              setTotpInput('');
              setExportShake(true);
              setTimeout(() => setExportShake(false), 500);
          }
      };

      const saveProject = () => {
          if (!editFormData.name) return alert("楼盘名称必填");
          let newProjects = [...projects];
          const projectData = { ...editFormData };
          if (!projectData.floorPlans) projectData.floorPlans = [];
          if (!projectData.masterPlans) projectData.masterPlans = [];

          projectData.floorPlans = projectData.floorPlans.filter(fp => fp.url);

          if (projectData.id) {
              newProjects = newProjects.map(p => p.id === projectData.id ? projectData : p);
          } else {
              newProjects = [{ id: 'proj_' + Date.now().toString(), ...projectData }, ...newProjects];
          }
          saveData({ realEstateProjects: newProjects });
          setIsEditing(false);
          if (projectData.id) setSelectedProject(newProjects.find(p => p.id === projectData.id));
      };

      const openMap = (address) => {
          if (!address) return alert("请先录入地址");
          window.open(`https://map.baidu.com/search/${encodeURIComponent(address)}`, '_blank');
      };

      const filteredClients = useMemo(() => {
          return clients.filter(c => c.name?.includes(searchQuery) || c.phone?.includes(searchQuery) || c.intentArea?.includes(searchQuery) || c.salesperson?.includes(searchQuery)
          ).sort((a, b) => { const priority = { 'S': 4, 'A': 3, 'B': 2, 'C': 1 }; return (priority[b.level] || 0) - (priority[a.level] || 0); });
      }, [clients, searchQuery]);

      const filteredProjects = useMemo(() => {
          return projects.filter(p => p.name?.includes(searchQuery) || p.area?.includes(searchQuery) || p.tags?.includes(searchQuery));
      }, [projects, searchQuery]);

      const todaysFollowUps = useMemo(() => {
          const today = getTodayString(); return clients.filter(c => c.nextRemindDate === today || (c.nextRemindDate && c.nextRemindDate < today));
      }, [clients]);

      if (isLocked) {
        return (
          <div className={`min-h-screen flex items-center justify-center ${theme.bg} relative overflow-hidden transition-colors duration-500 px-4`}>
             <div className="absolute inset-0 z-0 opacity-20 pointer-events-none" style={{ backgroundImage: 'radial-gradient(circle at 50% 50%, #8b5cf6 0%, transparent 50%)' }}></div>
             <div className={`z-10 w-full max-w-md p-6 sm:p-12 rounded-[2rem] shadow-2xl ${isDarkMode ? 'bg-[#1e293b]/90 border border-[#334155]' : 'bg-white/90 border border-white'} glass flex flex-col items-center ${shake ? 'animate-shake' : ''}`}>
                <div className={`w-16 h-16 sm:w-20 sm:h-20 rounded-full flex items-center justify-center mb-6 shadow-inner ${isDarkMode ? 'bg-[#0f172a]' : 'bg-slate-50'}`}>
                    <Lock className="w-8 h-8 sm:w-10 sm:h-10 text-purple-500" strokeWidth={1.5} />
                </div>
                <h1 className={`text-xl sm:text-2xl font-black mb-2 tracking-tight ${theme.textMain}`}>房产客源管理系统</h1>
                <p className={`text-xs sm:text-sm mb-8 font-medium ${theme.textSub}`}>机密数据，请输入访问密码</p>
                <div className="w-full relative">
                    <input type="password" value={pwdInput} onChange={(e) => setPwdInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleUnlock()} placeholder="解锁密码" className={`w-full px-6 py-4 rounded-xl border text-center text-lg tracking-widest outline-none transition-all focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 ${theme.inputBg} ${theme.textMain}`} />
                </div>
                <button onClick={handleUnlock} className={`w-full mt-6 py-4 rounded-xl font-bold shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 ${theme.primary}`}>
                    <Unlock className="w-5 h-5" /> 立即解锁
                </button>
             </div>
          </div>
        );
      }

      const renderDashboard = () => (
          <div className="space-y-4 sm:space-y-6 animate-in fade-in duration-500 pb-20 md:pb-6">
              <h2 className={`text-xl sm:text-2xl font-black tracking-tight ${theme.textMain}`}>工作台</h2>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 sm:gap-4">
                  <div className={`p-4 sm:p-5 rounded-2xl border ${theme.card} shadow-sm`}>
                      <div className={`text-xs sm:text-sm font-bold flex items-center gap-1 sm:gap-2 ${theme.textSub}`}><Users className="w-4 h-4 text-blue-500"/> 总客户数</div>
                      <div className={`text-2xl sm:text-3xl font-black mt-2 font-mono ${theme.textMain}`}>{clients.length}</div>
                  </div>
                  <div className={`p-4 sm:p-5 rounded-2xl border ${theme.card} shadow-sm`}>
                      <div className={`text-xs sm:text-sm font-bold flex items-center gap-1 sm:gap-2 ${theme.textSub}`}><Target className="w-4 h-4 text-yellow-500"/> S级客户</div>
                      <div className={`text-2xl sm:text-3xl font-black mt-2 font-mono ${theme.textMain}`}>{clients.filter(c=>c.level==='S').length}</div>
                  </div>
                  <div className={`p-4 sm:p-5 rounded-2xl border ${theme.card} shadow-sm`}>
                      <div className={`text-xs sm:text-sm font-bold flex items-center gap-1 sm:gap-2 ${theme.textSub}`}><Building2 className="w-4 h-4 text-purple-500"/> 录入楼盘</div>
                      <div className={`text-2xl sm:text-3xl font-black mt-2 font-mono ${theme.textMain}`}>{projects.length}</div>
                  </div>
                  <div className={`p-4 sm:p-5 rounded-2xl border ${theme.card} shadow-sm`}>
                      <div className={`text-xs sm:text-sm font-bold flex items-center gap-1 sm:gap-2 ${theme.textSub}`}><Clock className="w-4 h-4 text-red-500"/> 今日待办</div>
                      <div className={`text-2xl sm:text-3xl font-black mt-2 font-mono text-red-500`}>{todaysFollowUps.length}</div>
                  </div>
              </div>

              <div className={`rounded-2xl border ${theme.card} shadow-sm overflow-hidden`}>
                  <div className={`p-3 sm:p-4 border-b flex items-center gap-2 ${isDarkMode ? 'border-[#334155]' : 'border-gray-100'}`}>
                      <AlertCircle className="w-5 h-5 text-red-500" />
                      <h3 className={`font-bold text-sm sm:text-base ${theme.textMain}`}>今日需跟进/回访客源</h3>
                  </div>
                  <div className="divide-y divide-gray-100 dark:divide-[#334155]">
                      {todaysFollowUps.length === 0 ? (
                          <div className={`p-8 text-center text-xs sm:text-sm ${theme.textSub}`}>今日暂无需要跟进的客户，主动出击去开发吧！</div>
                      ) : (
                          todaysFollowUps.map(client => (
                              <div key={client.id} className={`p-3 sm:p-4 flex items-center justify-between hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors cursor-pointer`} onClick={() => { setActiveTab('clients'); setSelectedClient(client); }}>
                                  <div className="flex flex-col gap-1">
                                      <div className="flex items-center gap-2">
                                          <span className={`font-bold text-sm sm:text-base ${theme.textMain}`}>{client.name}</span>
                                          <span className={`px-2 py-0.5 rounded text-[10px] font-bold text-white ${client.level === 'S' ? 'bg-yellow-500' : client.level === 'A' ? 'bg-red-500' : 'bg-blue-500'}`}>{client.level}级</span>
                                          {client.salesperson && client.salesperson !== '钱学斌（管理员）' && (
                                              <span className={`text-[9px] font-bold px-1.5 py-0.5 rounded bg-purple-100 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400`}>{client.salesperson}</span>
                                          )}
                                      </div>
                                      <div className={`text-[10px] sm:text-xs flex items-center gap-3 ${theme.textSub}`}>
                                          <span className="flex items-center gap-1"><Phone className="w-3 h-3"/> {client.phone || '无电话'}</span>
                                          {client.intentArea && <span className="flex items-center gap-1"><MapPin className="w-3 h-3"/> {client.intentArea}</span>}
                                      </div>
                                  </div>
                                  <ChevronRight className={`w-4 h-4 sm:w-5 sm:h-5 ${theme.textSub}`} />
                              </div>
                          ))
                      )}
                  </div>
              </div>
          </div>
      );

      const renderClients = () => (
          <div className="h-full flex flex-col animate-in fade-in duration-300 relative pb-20 md:pb-6">
              {!selectedClient && !isEditing ? (
                  <>
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 sm:gap-4 mb-4 sm:mb-6">
                          <h2 className={`text-xl sm:text-2xl font-black tracking-tight ${theme.textMain}`}>客户池</h2>
                          <div className="flex flex-col sm:flex-row items-center gap-2 sm:gap-3 w-full sm:w-auto">
                              <div className="relative w-full sm:w-64">
                                  <Search className={`w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 ${theme.textSub}`} />
                                  <input type="text" placeholder="搜索姓名/电话/归属人..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className={`w-full pl-9 pr-4 py-2.5 rounded-xl border text-sm outline-none ${theme.inputBg} ${theme.textMain}`} />
                              </div>
                              <div className="flex gap-2 w-full sm:w-auto">
                                  <button onClick={() => setShowExportModal(true)} className={`flex-1 sm:flex-none px-4 py-2.5 rounded-xl font-bold flex items-center justify-center gap-1.5 shadow-md transition-transform active:scale-95 border bg-white dark:bg-slate-800 text-blue-600 dark:text-blue-400 hover:scale-105`}>
                                      <DownloadCloud className="w-4 h-4" /> 导出
                                  </button>
                                  <button onClick={() => { setEditFormData({ level: 'B', type: '刚需', salesperson: '钱学斌（管理员）' }); setIsEditing(true); }} className={`flex-[2] sm:flex-none px-4 py-2.5 rounded-xl font-bold flex items-center justify-center gap-1.5 shadow-md transition-transform active:scale-95 ${theme.primary}`}>
                                      <Plus className="w-4 h-4" /> 新增录入
                                  </button>
                              </div>
                          </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3 sm:gap-4 overflow-y-auto">
                          {filteredClients.map(client => (
                              <div key={client.id} onClick={() => setSelectedClient(client)} className={`p-4 sm:p-5 rounded-2xl border ${theme.card} shadow-sm cursor-pointer hover:shadow-md transition-all hover:-translate-y-1 group`}>
                                  <div className="flex justify-between items-start mb-3">
                                      <div className="flex items-center gap-3">
                                          <div className={`w-10 h-10 sm:w-12 sm:h-12 rounded-full flex items-center justify-center text-base sm:text-lg font-black text-white shadow-inner ${client.level === 'S' ? 'bg-gradient-to-br from-yellow-400 to-orange-500' : client.level === 'A' ? 'bg-gradient-to-br from-red-400 to-rose-600' : 'bg-gradient-to-br from-blue-400 to-indigo-600'}`}>
                                              {client.level}
                                          </div>
                                          <div>
                                              <div className="flex items-center gap-2">
                                                  <h3 className={`text-base sm:text-lg font-bold ${theme.textMain}`}>{client.name}</h3>
                                                  <span className={`px-1.5 py-0.5 flex items-center gap-1 rounded-md text-[9px] font-bold ${isDarkMode ? 'bg-purple-900/40 text-purple-300' : 'bg-purple-100 text-purple-600'}`}>
                                                      <UserCheck className="w-2.5 h-2.5" />
                                                      {client.salesperson || '未分配'}
                                                  </span>
                                              </div>
                                              <div className={`text-[10px] sm:text-xs mt-0.5 flex items-center gap-1 ${theme.textSub}`}><Phone className="w-3 h-3"/> {client.phone || '未留存'}</div>
                                          </div>
                                      </div>
                                  </div>
                                  <div className={`grid grid-cols-2 gap-y-2 text-[10px] sm:text-xs mt-3 sm:mt-4 p-2.5 sm:p-3 rounded-xl ${isDarkMode ? 'bg-[#0f172a]' : 'bg-slate-50'}`}>
                                      <div className="flex flex-col"><span className={theme.textSub}>意向区域</span><span className={`font-bold truncate ${theme.textMain}`}>{client.intentArea || '--'}</span></div>
                                      <div className="flex flex-col"><span className={theme.textSub}>预算(万)</span><span className={`font-bold font-mono text-orange-500`}>{client.budget || '--'}</span></div>
                                      <div className="flex flex-col"><span className={theme.textSub}>购房目的</span><span className={`font-bold ${theme.textMain}`}>{client.type || '--'}</span></div>
                                      <div className="flex flex-col"><span className={theme.textSub}>下次跟进</span><span className={`font-bold ${client.nextRemindDate && client.nextRemindDate <= getTodayString() ? 'text-red-500' : theme.textMain}`}>{client.nextRemindDate || '未设置'}</span></div>
                                  </div>
                              </div>
                          ))}
                      </div>

                      {showExportModal && (
                          <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                              <div className={`p-6 rounded-[2rem] w-full max-w-sm shadow-2xl flex flex-col items-center border ${isDarkMode ? 'bg-[#1e293b] border-[#334155]' : 'bg-white border-gray-200'}`}>
                                  <div className="w-14 h-14 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-500 mb-4 shadow-inner">
                                      <Lock className="w-7 h-7" strokeWidth={2}/>
                                  </div>
                                  
                                  {exportAuthMode === 'password' && (
                                      <>
                                          <h2 className={`text-xl font-black tracking-tight mb-2 ${theme.textMain}`}>安全导出验证</h2>
                                          <p className={`text-xs text-center mb-6 leading-relaxed ${theme.textSub}`}>客资为公司机密资产。<br/>导出全部客户明细需要输入高级管理员密码。</p>
                                          
                                          <div className={`w-full flex flex-col gap-4 ${exportShake ? 'animate-shake' : ''}`}>
                                              <input type="password" placeholder="请输入二级密码" value={exportPwdInput} onChange={(e) => setExportPwdInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleExportClients(false)} className={`w-full px-5 py-3 rounded-xl border text-center font-mono tracking-widest outline-none focus:border-blue-500 ${theme.inputBg} ${theme.textMain}`} />
                                              <div className="flex gap-3 w-full">
                                                  <button onClick={() => { setShowExportModal(false); setExportPwdInput(''); }} className={`flex-1 py-3 rounded-xl font-bold transition-transform active:scale-95 ${isDarkMode ? 'bg-[#334155] text-slate-300' : 'bg-gray-200 text-gray-700'}`}>取消</button>
                                                  <button onClick={() => handleExportClients(false)} className="flex-[2] py-3 bg-blue-600 text-white font-bold rounded-xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
                                                      <DownloadCloud className="w-4 h-4"/> 确认导出
                                                  </button>
                                              </div>
                                          </div>
                                          <button onClick={() => setExportAuthMode('totp')} className={`mt-5 text-[10px] sm:text-xs font-bold flex items-center gap-1 hover:underline text-blue-500`}>
                                              忘记密码？使用 Google 验证器
                                          </button>
                                      </>
                                  )}

                                  {exportAuthMode === 'totp' && (
                                      <>
                                          <h2 className={`text-xl font-black tracking-tight mb-2 ${theme.textMain}`}>验证器安全验证</h2>
                                          <p className={`text-xs text-center mb-6 leading-relaxed ${theme.textSub}`}>请输入 Google Authenticator 上的 6 位动态验证码</p>
                                          
                                          <div className={`w-full flex flex-col gap-4 ${exportShake ? 'animate-shake' : ''}`}>
                                              <input type="number" placeholder="6位数动态码" value={totpInput} onChange={(e) => setTotpInput(e.target.value.slice(0, 6))} onKeyDown={(e) => e.key === 'Enter' && handleTotpVerify()} className={`w-full px-5 py-3 rounded-xl border text-center font-mono text-2xl tracking-widest outline-none focus:border-blue-500 ${theme.inputBg} ${theme.textMain}`} />
                                              <div className="flex gap-3 w-full">
                                                  <button onClick={() => setExportAuthMode('password')} className={`flex-1 py-3 rounded-xl font-bold transition-transform active:scale-95 ${isDarkMode ? 'bg-[#334155] text-slate-300' : 'bg-gray-200 text-gray-700'}`}>返回密码</button>
                                                  <button onClick={handleTotpVerify} className="flex-[2] py-3 bg-green-600 text-white font-bold rounded-xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2">
                                                      验证并导出
                                                  </button>
                                              </div>
                                          </div>
                                          <button onClick={() => setExportAuthMode('qr')} className={`mt-5 text-[10px] sm:text-xs font-bold flex items-center gap-1 hover:underline text-gray-500`}>
                                              首次使用？查看绑定二维码
                                          </button>
                                      </>
                                  )}

                                  {exportAuthMode === 'qr' && (
                                      <>
                                          <h2 className={`text-xl font-black tracking-tight mb-2 ${theme.textMain}`}>绑定验证器</h2>
                                          <p className={`text-xs text-center mb-4 leading-relaxed ${theme.textSub}`}>请打开 Google Authenticator App 扫描下方二维码</p>
                                          
                                          <div className="bg-white p-2 rounded-xl mb-4 shadow-sm border border-gray-200">
                                              <img src={`https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(totp.toString())}`} alt="TOTP QR Code" className="w-40 h-40 object-contain" />
                                          </div>
                                          
                                          <div className={`text-[10px] font-mono p-2 rounded bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-400 mb-6 text-center w-full break-all`}>
                                              或者手动输入密钥: <br/><strong className="text-sm select-all text-blue-500">{TOTP_SECRET}</strong>
                                          </div>

                                          <div className="flex gap-3 w-full">
                                              <button onClick={() => setExportAuthMode('totp')} className={`w-full py-3 rounded-xl text-sm font-bold transition-transform active:scale-95 bg-blue-600 text-white shadow-lg`}>
                                                  我已绑定，去输入验证码
                                              </button>
                                          </div>
                                      </>
                                  )}
                              </div>
                          </div>
                      )}

                  </>
              ) : isEditing ? (
                  <div className={`max-w-2xl mx-auto w-full p-4 sm:p-8 rounded-[2rem] border ${theme.card} shadow-xl animate-in slide-in-from-bottom-4`}>
                      <div className="flex justify-between items-center mb-4 sm:mb-6">
                          <h2 className={`text-lg sm:text-xl font-black ${theme.textMain}`}>{editFormData.id ? '编辑客户资料' : '新增客资'}</h2>
                          <button onClick={() => { setIsEditing(false); setErrorMsg(null); }} className={`p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 ${theme.textSub}`}><X className="w-5 h-5"/></button>
                      </div>

                      {errorMsg && (
                          <div className="mb-4 p-3 rounded-xl bg-red-100 text-red-600 text-xs font-bold flex items-center gap-2 animate-bounce">
                              <AlertCircle size={14} /> {errorMsg}
                          </div>
                      )}

                      <div className="space-y-4">
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>客户姓名 *</label>
                                  <input type="text" value={editFormData.name || ''} onChange={e=>{setEditFormData({...editFormData, name: e.target.value}); setErrorMsg(null);}} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`} />
                              </div>
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>联系电话</label>
                                  <input type="tel" value={editFormData.phone || ''} onChange={e=>{setEditFormData({...editFormData, phone: e.target.value}); setErrorMsg(null);}} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`} />
                              </div>
                          </div>
                          
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 text-purple-500`}>归属业务员 *</label>
                                  <select value={editFormData.salesperson || '钱学斌（管理员）'} onChange={e=>setEditFormData({...editFormData, salesperson: e.target.value})} className={`w-full p-3 rounded-xl border text-sm font-bold text-purple-600 dark:text-purple-400 bg-purple-50 dark:bg-purple-900/20 border-purple-200 dark:border-purple-800`}>
                                      {SALESPERSONS.map(sp => (
                                          <option key={sp} value={sp}>{sp}</option>
                                      ))}
                                  </select>
                              </div>
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>意向等级</label>
                                  <select value={editFormData.level || 'B'} onChange={e=>setEditFormData({...editFormData, level: e.target.value})} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`}>
                                      <option value="S">S级 (准客/逼定)</option><option value="A">A级 (高意向/常看房)</option><option value="B">B级 (观望/需培育)</option><option value="C">C级 (死客/无效)</option>
                                  </select>
                              </div>
                          </div>

                          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-4">
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>购房目的</label>
                                  <select value={editFormData.type || '刚需'} onChange={e=>setEditFormData({...editFormData, type: e.target.value})} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`}>
                                      <option value="刚需">刚需上车</option><option value="改善">改善置换</option><option value="投资">纯投资</option><option value="学区">学区落户</option>
                                  </select>
                              </div>
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>预算 (万)</label>
                                  <input type="text" placeholder="例: 首付50" value={editFormData.budget || ''} onChange={e=>setEditFormData({...editFormData, budget: e.target.value})} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`} />
                              </div>
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>意向板块</label>
                                  <input type="text" placeholder="例: 科技城" value={editFormData.intentArea || ''} onChange={e=>setEditFormData({...editFormData, intentArea: e.target.value})} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`} />
                              </div>
                          </div>
                          <div>
                              <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>核心诉求/痛点备注</label>
                              <textarea rows="3" value={editFormData.requirement || ''} onChange={e=>setEditFormData({...editFormData, requirement: e.target.value})} className={`w-full p-3 rounded-xl border resize-none text-sm ${theme.inputBg} ${theme.textMain}`} placeholder="例如：必须带学区、不要顶底楼..."></textarea>
                          </div>
                          <button onClick={saveClient} className={`w-full py-3.5 rounded-xl font-bold mt-2 shadow-lg active:scale-95 transition-transform ${theme.primary}`}>保存资料</button>
                      </div>
                  </div>
              ) : (
                  <div className="flex flex-col lg:flex-row gap-4 sm:gap-6 h-full">
                      {/* 左侧详情卡片 */}
                      <div className="w-full lg:w-1/3 space-y-4">
                          <button onClick={() => setSelectedClient(null)} className={`flex items-center gap-1 text-sm font-bold hover:underline mb-1 ${theme.primaryText}`}>
                              <ChevronRight className="w-4 h-4 rotate-180" /> 返回客源库
                          </button>
                          <div className={`p-5 sm:p-6 rounded-[2rem] border ${theme.card} shadow-lg relative overflow-hidden`}>
                              <div className="absolute top-0 right-0 p-4 opacity-10"><Users className="w-20 h-20 sm:w-24 sm:h-24" /></div>
                              <div className="relative z-10">
                                  <div className="flex justify-between items-start">
                                      <div>
                                          <h2 className={`text-2xl sm:text-3xl font-black tracking-tight ${theme.textMain}`}>{selectedClient.name}</h2>
                                          <div className={`mt-2 inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[10px] sm:text-xs font-bold text-white shadow-sm ${selectedClient.level === 'S' ? 'bg-yellow-500' : selectedClient.level === 'A' ? 'bg-red-500' : 'bg-blue-500'}`}>
                                              {selectedClient.level}级意向
                                          </div>
                                      </div>
                                      <div className="flex gap-2">
                                          <button onClick={() => setShowDeleteConfirm(selectedClient.id)} className={`p-2 sm:p-2.5 rounded-xl border bg-white dark:bg-slate-800 shadow-sm text-red-500 hover:scale-105 transition-transform`}>
                                              <Trash2 className="w-4 h-4 sm:w-5 sm:h-5" />
                                          </button>
                                          <button onClick={() => { setEditFormData(selectedClient); setIsEditing(true); }} className={`p-2 sm:p-2.5 rounded-xl border bg-white dark:bg-slate-800 shadow-sm text-blue-500 hover:scale-105 transition-transform`}>
                                              <Edit className="w-4 h-4 sm:w-5 sm:h-5" />
                                          </button>
                                      </div>
                                  </div>

                                  <div className="mt-6 sm:mt-8 space-y-3 sm:space-y-4">
                                      <div className="flex items-center gap-3">
                                          <div className="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center text-green-500"><Phone className="w-4 h-4 sm:w-5 sm:h-5"/></div>
                                          <div>
                                              <p className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-widest ${theme.textSub}`}>联系电话</p>
                                              <p className={`font-bold text-base sm:text-lg font-mono ${theme.textMain}`}>{selectedClient.phone || '--'}</p>
                                          </div>
                                      </div>
                                      
                                      <div className="flex items-center gap-3">
                                          <div className="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-purple-100 dark:bg-purple-900/30 flex items-center justify-center text-purple-500"><UserCheck className="w-4 h-4 sm:w-5 sm:h-5"/></div>
                                          <div>
                                              <p className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-widest ${theme.textSub}`}>当前归属人</p>
                                              <p className={`font-bold text-sm sm:text-base text-purple-600 dark:text-purple-400`}>{selectedClient.salesperson || '钱学斌（管理员）'}</p>
                                          </div>
                                      </div>

                                      <div className="flex items-center gap-3">
                                          <div className="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-orange-100 dark:bg-orange-900/30 flex items-center justify-center text-orange-500"><DollarSign className="w-4 h-4 sm:w-5 sm:h-5"/></div>
                                          <div>
                                              <p className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-widest ${theme.textSub}`}>购房预算</p>
                                              <p className={`font-bold text-sm sm:text-base ${theme.textMain}`}>{selectedClient.budget || '未透露'}</p>
                                          </div>
                                      </div>
                                      <div className="flex items-center gap-3">
                                          <div className="w-8 h-8 sm:w-10 sm:h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center text-blue-500"><MapPin className="w-4 h-4 sm:w-5 sm:h-5"/></div>
                                          <div>
                                              <p className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-widest ${theme.textSub}`}>意向区域/板块</p>
                                              <p className={`font-bold text-sm sm:text-base ${theme.textMain}`}>{selectedClient.intentArea || '全城看'}</p>
                                          </div>
                                      </div>
                                  </div>
                                  {selectedClient.requirement && (
                                      <div className={`mt-5 sm:mt-6 p-3 sm:p-4 rounded-xl text-xs sm:text-sm ${isDarkMode ? 'bg-[#0f172a]' : 'bg-slate-50'} ${theme.textMain}`}>
                                          <span className="font-bold block mb-1">核心诉求:</span> {selectedClient.requirement}
                                      </div>
                                  )}
                              </div>
                          </div>
                      </div>

                      {/* 右侧跟进时间轴 */}
                      <div className="w-full lg:w-2/3 flex flex-col h-[500px] lg:h-full">
                          <div className={`flex-1 rounded-[2rem] border ${theme.card} shadow-lg flex flex-col overflow-hidden`}>
                              <div className={`p-4 sm:p-5 border-b flex items-center gap-2 ${isDarkMode ? 'border-[#334155]' : 'border-gray-100'}`}>
                                  <TrendingUp className="w-5 h-5 text-purple-500" />
                                  <h3 className={`text-base sm:text-lg font-bold ${theme.textMain}`}>跟进时间轴</h3>
                              </div>
                              <div className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-4 sm:space-y-6">
                                  {(!selectedClient.followUps || selectedClient.followUps.length === 0) ? (
                                      <div className="h-full flex flex-col items-center justify-center text-slate-400 text-xs sm:text-sm">
                                          <PhoneCall className="w-10 h-10 mb-2 sm:mb-3 opacity-20" />
                                          <p>暂无跟进记录，快去联系客户吧！</p>
                                      </div>
                                  ) : (
                                      selectedClient.followUps.map((fu, idx) => (
                                          <div key={fu.id || idx} className="relative pl-5 sm:pl-6 border-l-2 border-purple-200 dark:border-purple-900/50 pb-2 last:pb-0">
                                              <div className="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-purple-500 border-4 border-white dark:border-[#1e293b]"></div>
                                              <div className={`text-[10px] sm:text-xs font-mono font-bold mb-1 ${theme.textSub}`}>{fu.date}</div>
                                              <div className={`p-3 sm:p-4 rounded-xl rounded-tl-none ${isDarkMode ? 'bg-[#0f172a]' : 'bg-slate-50'} ${theme.textMain} text-xs sm:text-sm leading-relaxed whitespace-pre-wrap`}>
                                                  {fu.text}
                                              </div>
                                          </div>
                                      ))
                                  )}
                              </div>
                              <div className={`p-3 sm:p-4 border-t ${isDarkMode ? 'border-[#334155] bg-[#1e293b]' : 'border-gray-100 bg-white'}`}>
                                  <form onSubmit={(e) => { 
                                      e.preventDefault(); 
                                      const t = e.target.text.value; 
                                      const remindValue = reminderMode === 'custom' ? e.target.custom_date.value : e.target.days.value;
                                      addFollowUp(selectedClient.id, t, remindValue); 
                                      e.target.text.value=''; 
                                      if (e.target.days) e.target.days.value='0';
                                      if (e.target.custom_date) e.target.custom_date.value='';
                                  }} className="flex flex-col gap-2 sm:gap-3">
                                      <textarea name="text" rows="2" placeholder="记录本次通话/带看详情..." className={`w-full p-2.5 sm:p-3 rounded-xl border resize-none text-xs sm:text-sm outline-none focus:border-purple-500 ${theme.inputBg} ${theme.textMain}`} required></textarea>
                                      <div className="flex flex-col sm:flex-row items-center gap-2 sm:gap-3">
                                          <div className={`flex items-center gap-2 px-3 py-2 rounded-xl border w-full sm:w-auto sm:flex-1 ${theme.inputBg}`}>
                                              <Calendar className={`w-4 h-4 shrink-0 ${theme.textSub}`} />
                                              <span className={`text-[10px] sm:text-xs font-bold ${theme.textSub} shrink-0`}>下次提醒</span>
                                              
                                              {reminderMode === 'preset' ? (
                                                  <select 
                                                      name="days" 
                                                      onChange={(e) => e.target.value === 'custom' && setReminderMode('custom')}
                                                      className={`bg-transparent text-xs sm:text-sm font-bold outline-none w-full ${theme.textMain}`}
                                                  >
                                                      <option value="0">不提醒</option>
                                                      <option value="1">明天</option>
                                                      <option value="3">3天后</option>
                                                      <option value="7">1周后</option>
                                                      <option value="15">半个月后</option>
                                                      <option value="custom">📅 自定义日期</option>
                                                  </select>
                                              ) : (
                                                  <div className="flex items-center gap-2 w-full">
                                                      <input 
                                                          type="date" 
                                                          name="custom_date" 
                                                          required
                                                          min={getTodayString()}
                                                          className={`bg-transparent text-xs sm:text-sm font-bold outline-none w-full ${theme.textMain}`} 
                                                      />
                                                      <button 
                                                          type="button" 
                                                          onClick={() => setReminderMode('preset')}
                                                          className="text-[10px] text-gray-400 hover:text-purple-500 font-bold shrink-0"
                                                      >
                                                          取消
                                                      </button>
                                                  </div>
                                              )}
                                          </div>
                                          <button type="submit" className={`w-full sm:w-auto px-6 py-2.5 rounded-xl text-sm font-bold flex items-center justify-center gap-2 shadow-md ${theme.primary}`}>
                                              <Plus className="w-4 h-4" /> 记录
                                          </button>
                                      </div>
                                  </form>
                              </div>
                          </div>
                      </div>
                  </div>
              )}

              {/* Delete Confirmation Modal */}
              {showDeleteConfirm && (
                  <div className="fixed inset-0 z-[110] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                      <div className={`p-6 rounded-[2rem] w-full max-w-sm shadow-2xl flex flex-col items-center border ${isDarkMode ? 'bg-[#1e293b] border-[#334155]' : 'bg-white border-gray-200'} animate-in zoom-in duration-200`}>
                          <div className="w-14 h-14 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center text-red-500 mb-4 shadow-inner">
                              <Trash2 className="w-7 h-7" strokeWidth={2}/>
                          </div>
                          <h2 className={`text-xl font-black tracking-tight mb-2 ${theme.textMain}`}>确认删除客户？</h2>
                          <p className={`text-xs text-center mb-6 leading-relaxed ${theme.textSub}`}>此操作将永久删除客户资料及其跟进记录，<br/>该操作不可撤销。</p>
                          <div className="flex gap-3 w-full">
                              <button onClick={() => setShowDeleteConfirm(null)} className={`flex-1 py-3 rounded-xl font-bold transition-transform active:scale-95 ${isDarkMode ? 'bg-[#334155] text-slate-300' : 'bg-gray-200 text-gray-700'}`}>取消</button>
                              <button onClick={() => deleteClient(showDeleteConfirm)} className="flex-[2] py-3 bg-red-600 text-white font-bold rounded-xl shadow-lg transition-transform active:scale-95">
                                  确认删除
                              </button>
                          </div>
                      </div>
                  </div>
              )}
          </div>
      );

      const renderProjects = () => (
          <div className="h-full flex flex-col animate-in fade-in duration-300 relative pb-20 md:pb-6">
              {!selectedProject && !isEditing ? (
                  <>
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 sm:gap-4 mb-4 sm:mb-6">
                          <h2 className={`text-xl sm:text-2xl font-black tracking-tight ${theme.textMain}`}>新盘字典</h2>
                          <div className="flex flex-col sm:flex-row items-center gap-2 sm:gap-3 w-full sm:w-auto">
                              <div className="relative w-full sm:w-64">
                                  <Search className={`w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 ${theme.textSub}`} />
                                  <input type="text" placeholder="搜索楼盘名/区域..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className={`w-full pl-9 pr-4 py-2.5 rounded-xl border text-sm outline-none ${theme.inputBg} ${theme.textMain}`} />
                              </div>
                              <button onClick={() => { setEditFormData({ floorPlans: [], masterPlans: [] }); setIsEditing(true); }} className={`w-full sm:w-auto px-4 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 shadow-md transition-transform active:scale-95 bg-indigo-600 hover:bg-indigo-700 text-white`}>
                                  <Plus className="w-4 h-4" /> 录入新盘
                              </button>
                          </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-5 overflow-y-auto">
                          {filteredProjects.map(proj => {
                              let coverUrl = null;
                              if (proj.masterPlans && proj.masterPlans[0]) coverUrl = proj.masterPlans[0];
                              else if (proj.floorPlans && proj.floorPlans[0]) {
                                  coverUrl = typeof proj.floorPlans[0] === 'string' ? proj.floorPlans[0] : proj.floorPlans[0].url;
                              }

                              return (
                              <div key={proj.id} onClick={() => setSelectedProject(proj)} className={`rounded-2xl border ${theme.card} shadow-sm cursor-pointer hover:shadow-xl transition-all hover:-translate-y-1 overflow-hidden group flex flex-col`}>
                                  <div className={`h-36 sm:h-40 relative flex items-center justify-center overflow-hidden ${isDarkMode ? 'bg-[#0f172a]' : 'bg-slate-100'}`}>
                                      {coverUrl ? (
                                           <img src={coverUrl} alt="封面" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                      ) : (
                                          <Building2 className={`w-10 h-10 sm:w-12 sm:h-12 ${theme.textSub} opacity-50`} />
                                      )}
                                      <div className="absolute top-2 right-2 bg-black/60 backdrop-blur-md text-white px-2 py-1 rounded text-[10px] sm:text-xs font-bold font-mono">
                                          总套数 {proj.totalUnits || '--'}
                                      </div>
                                  </div>
                                  <div className="p-4 sm:p-5 flex-1 flex flex-col">
                                      <h3 className={`text-lg sm:text-xl font-black mb-1 truncate ${theme.textMain}`}>{proj.name}</h3>
                                      <div className={`text-[10px] sm:text-xs flex items-center gap-1 mb-3 ${theme.textSub} truncate`}><MapPin className="w-3 h-3 shrink-0"/> {proj.address || '地址未录入'}</div>
                                      
                                      <div className="grid grid-cols-2 gap-3 sm:gap-4 mb-3 sm:mb-4">
                                          <div>
                                              <p className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-widest ${theme.textSub}`}>均价/单价</p>
                                              <p className="font-bold text-red-500 font-mono text-sm sm:text-base">{proj.price || '待定'}</p>
                                          </div>
                                          <div>
                                              <p className={`text-[9px] sm:text-[10px] font-bold uppercase tracking-widest ${theme.textSub}`}>主力面积段</p>
                                              <p className={`font-bold font-mono text-sm sm:text-base ${theme.textMain}`}>{selectedProject.area || '--'} ㎡</p>
                                          </div>
                                      </div>
                                      <div className="mt-auto flex gap-1 flex-wrap">
                                          {(proj.tags || '').split(/[,， ]/).filter(Boolean).slice(0, 3).map((tag, i) => (
                                              <span key={i} className={`px-2 py-0.5 rounded text-[9px] sm:text-[10px] font-bold bg-indigo-100 text-indigo-600 dark:bg-indigo-900/30 dark:text-indigo-400`}>{tag}</span>
                                          ))}
                                      </div>
                                  </div>
                              </div>
                          )})}
                      </div>
                  </>
              ) : isEditing ? (
                  <div className={`max-w-3xl mx-auto w-full p-4 sm:p-8 rounded-[2rem] border ${theme.card} shadow-xl animate-in slide-in-from-bottom-4`}>
                      <div className="flex justify-between items-center mb-4 sm:mb-6">
                          <h2 className={`text-lg sm:text-xl font-black ${theme.textMain}`}>{editFormData.id ? '编辑楼盘信息' : '录入新盘'}</h2>
                          <button onClick={() => setIsEditing(false)} className={`p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 ${theme.textSub}`}><X className="w-5 h-5"/></button>
                      </div>
                      <div className="space-y-4 sm:space-y-5">
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-5">
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>楼盘名称 *</label>
                                  <input type="text" value={editFormData.name || ''} onChange={e=>setEditFormData({...editFormData, name: e.target.value})} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`} />
                              </div>
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>项目地址</label>
                                  <input type="text" placeholder="录入后可一键打开地图" value={editFormData.address || ''} onChange={e=>setEditFormData({...editFormData, address: e.target.value})} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`} />
                              </div>
                          </div>
                          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-5">
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>均价 (元/㎡)</label>
                                  <input type="text" value={editFormData.price || ''} onChange={e=>setEditFormData({...editFormData, price: e.target.value})} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`} />
                              </div>
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>主力面积段 (㎡)</label>
                                  <input type="text" placeholder="例: 89-120" value={editFormData.area || ''} onChange={e=>setEditFormData({...editFormData, area: e.target.value})} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`} />
                              </div>
                              <div>
                                  <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>楼盘总套数</label>
                                  <input type="number" placeholder="例: 800" value={editFormData.totalUnits || ''} onChange={e=>setEditFormData({...editFormData, totalUnits: e.target.value})} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} text-indigo-500 font-bold`} />
                              </div>
                          </div>
                          <div>
                              <label className={`block text-xs font-bold mb-1.5 ${theme.textSub}`}>核心卖点标签 (用空格或逗号隔开)</label>
                              <input type="text" placeholder="例: 学区房 近地铁 核心区 现房" value={editFormData.tags || ''} onChange={e=>setEditFormData({...editFormData, tags: e.target.value})} className={`w-full p-3 rounded-xl border text-sm ${theme.inputBg} ${theme.textMain}`} />
                          </div>
                          
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                              <div className={`p-4 rounded-xl border ${isDarkMode ? 'bg-[#0f172a] border-[#334155]' : 'bg-slate-50 border-gray-200'}`}>
                                  <label className={`block text-xs sm:text-sm font-bold flex items-center gap-1.5 mb-1 ${theme.textMain}`}>
                                      <Map className="w-4 h-4 text-emerald-500"/> 总平图 / 鸟瞰图
                                  </label>
                                  <p className={`text-[10px] mb-3 ${theme.textSub}`}>支持点击/拖拽，自动极速压缩。</p>
                                  <div className="flex flex-wrap gap-3 items-start">
                                      {(editFormData.masterPlans || []).map((imgUrl, idx) => (
                                          <div key={idx} className="relative w-16 h-16 sm:w-20 sm:h-20 rounded-lg overflow-hidden border border-gray-300 group shadow-sm shrink-0">
                                              <img src={imgUrl} className="w-full h-full object-cover" alt="总平图" />
                                              <button onClick={() => removeImage('masterPlans', idx)} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><X className="w-3 h-3" /></button>
                                          </div>
                                      ))}
                                      <div className="relative w-16 h-16 sm:w-20 sm:h-20 rounded-lg border-2 border-dashed border-emerald-300 dark:border-emerald-700 bg-emerald-50 dark:bg-emerald-900/20 flex flex-col items-center justify-center cursor-pointer hover:bg-emerald-100 dark:hover:bg-emerald-900/40 transition-colors shrink-0">
                                          <input type="file" multiple accept="image/*" onChange={(e) => handleImageUpload(e, 'masterPlans')} disabled={isUploading.masterPlans} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                          {isUploading.masterPlans ? <LucideIcons.Loader2 className="w-5 h-5 text-emerald-500 animate-spin" /> : <><UploadCloud className="w-5 h-5 text-emerald-500 mb-0.5" /><span className="text-[9px] text-emerald-600 dark:text-emerald-400 font-bold">上传图片</span></>}
                                      </div>
                                  </div>
                              </div>

                              <div className={`p-4 rounded-xl border ${isDarkMode ? 'bg-[#0f172a] border-[#334155]' : 'bg-slate-50 border-gray-200'}`}>
                                  <label className={`block text-xs sm:text-sm font-bold flex items-center gap-1.5 mb-1 ${theme.textMain}`}>
                                      <ImageIcon className="w-4 h-4 text-indigo-500"/> 主力户型图册
                                  </label>
                                  <p className={`text-[10px] mb-3 ${theme.textSub}`}>支持多图同时上传，每张可单独备注面积。</p>
                                  <div className="flex flex-wrap gap-4 items-start">
                                      {(editFormData.floorPlans || []).map((planObj, idx) => (
                                          <div key={idx} className="relative w-20 sm:w-24 flex flex-col gap-1.5 shrink-0 group">
                                              <div className="relative w-full h-20 sm:h-24 rounded-lg overflow-hidden border border-gray-300 shadow-sm">
                                                  <img src={typeof planObj === 'string' ? planObj : planObj.url} className="w-full h-full object-cover" alt="户型图" />
                                                  <button onClick={() => removeImage('floorPlans', idx)} className="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><X className="w-3 h-3" /></button>
                                              </div>
                                              <input 
                                                  type="number" 
                                                  placeholder="面积(㎡)" 
                                                  value={typeof planObj === 'string' ? '' : planObj.area} 
                                                  onChange={e => handleFloorPlanAreaChange(idx, e.target.value)} 
                                                  className={`w-full text-xs p-1.5 text-center border rounded outline-none focus:border-indigo-500 font-mono ${theme.inputBg} ${theme.textMain}`}
                                              />
                                          </div>
                                      ))}
                                      <div className="relative w-20 h-20 sm:w-24 sm:h-24 rounded-lg border-2 border-dashed border-indigo-300 dark:border-indigo-700 bg-indigo-50 dark:bg-indigo-900/20 flex flex-col items-center justify-center cursor-pointer hover:bg-indigo-100 dark:hover:bg-indigo-900/40 transition-colors shrink-0">
                                          <input type="file" multiple accept="image/*" onChange={(e) => handleImageUpload(e, 'floorPlans')} disabled={isUploading.floorPlans} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                                          {isUploading.floorPlans ? <LucideIcons.Loader2 className="w-5 h-5 text-indigo-500 animate-spin" /> : <><UploadCloud className="w-5 h-5 text-indigo-500 mb-0.5" /><span className="text-[9px] text-indigo-600 dark:text-indigo-400 font-bold">加户型</span></>}
                                      </div>
                                  </div>
                              </div>
                          </div>

                          <button onClick={saveProject} className={`w-full py-3.5 sm:py-4 rounded-xl text-sm sm:text-base font-bold mt-4 shadow-lg active:scale-95 transition-transform bg-indigo-600 hover:bg-indigo-700 text-white`}>保存楼盘档案</button>
                      </div>
                  </div>
              ) : (
                  <div className="flex flex-col h-full">
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 mb-4 shrink-0">
                          <button onClick={() => setSelectedProject(null)} className={`flex items-center gap-1 text-sm font-bold hover:underline text-indigo-500`}>
                              <ChevronRight className="w-4 h-4 rotate-180" /> 返回字典
                          </button>
                          <div className="flex gap-2 w-full sm:w-auto">
                              <button onClick={() => prepareEditProject(selectedProject)} className={`flex-1 sm:flex-none px-3 py-2 sm:px-4 rounded-lg text-xs sm:text-sm font-bold border bg-white dark:bg-slate-800 shadow-sm text-blue-500 hover:scale-105 transition-transform flex justify-center items-center`}>
                                  编辑资料
                              </button>
                          </div>
                      </div>
                      
                      <div className={`flex-1 rounded-[2rem] border ${theme.card} shadow-lg overflow-y-auto relative`}>
                          <div className={`p-5 sm:p-10 border-b ${isDarkMode ? 'border-[#334155]' : 'border-gray-100'} bg-gradient-to-r from-indigo-50 to-transparent dark:from-indigo-900/10`}>
                              <h2 className={`text-2xl sm:text-4xl font-black tracking-tight mb-2 ${theme.textMain}`}>{selectedProject.name}</h2>
                              <div className="flex flex-wrap items-center gap-2 mt-3">
                                  <div className={`px-2 py-1 sm:px-3 sm:py-1.5 rounded-lg flex items-center gap-1 text-xs sm:text-sm font-bold shadow-sm cursor-pointer hover:opacity-80 transition-opacity bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400`} onClick={() => openMap(selectedProject.address)}>
                                      <MapPin className="w-3 h-3 sm:w-4 sm:h-4" /> {selectedProject.address || '暂无地址'} <ExternalLink className="w-3 h-3 opacity-50"/>
                                  </div>
                                  {(selectedProject.tags || '').split(/[,， ]/).filter(Boolean).map((tag, i) => (
                                      <span key={i} className={`px-2 py-1 rounded-md text-[10px] sm:text-xs font-bold border ${isDarkMode ? 'border-indigo-500/30 text-indigo-400' : 'border-indigo-200 text-indigo-600'}`}>{tag}</span>
                                  ))}
                              </div>
                          </div>

                          <div className="grid grid-cols-1 md:grid-cols-3 gap-5 sm:gap-6 p-5 sm:p-10">
